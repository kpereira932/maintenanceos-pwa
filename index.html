<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MaintOS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a18">
<meta name="description" content="Multi-location restaurant maintenance management">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>MaintenanceOS v2.6</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* Hide all app chrome until logged in */
.sidebar, #mobile-topbar-el, .mobile-bottom-nav {
  visibility: hidden !important;
}
body.logged-in .sidebar,
body.logged-in #mobile-topbar-el,
body.logged-in .mobile-bottom-nav,
body.logged-in {
  visibility: visible !important;
}

*{box-sizing:border-box;margin:0;padding:0}
:root{--amber:#C8862E;--amber-dark:#A66E22;--amber-light:#F7E8D4;--cream:#FAF7F2;--warm-white:#FDFCFA;--white:#FFFFFF;--charcoal:#2B2824;--text-muted:#8A8378;--tan:#E8E1D6;--border:#EEE8DE;--green:#1B4332;--shadow:0 1px 3px rgba(0,0,0,.05);--radius:10px;}
body{font-family:'Georgia',serif;background:var(--cream);color:var(--charcoal);font-size:14px;min-height:100vh}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--cream);background-image:radial-gradient(circle at 20% 50%,rgba(27,67,50,.06) 0%,transparent 60%),radial-gradient(circle at 80% 20%,rgba(200,144,10,.06) 0%,transparent 60%)}
.auth-card{background:var(--warm-white);border-radius:12px;padding:2.5rem;width:400px;max-width:100%;box-shadow:0 4px 40px rgba(27,67,50,.15);border:1px solid var(--tan)}
.auth-logo{font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:.5px;color:#C48524;font-family:'Georgia',serif}
.auth-sub{font-size:12px;color:var(--text-muted);margin-bottom:2rem;letter-spacing:.5px;text-transform:uppercase}
.auth-roles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.role-btn{padding:12px 8px;border-radius:4px;border:1.5px solid var(--tan);background:var(--warm-white);cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--text-muted);font-family:inherit;transition:all .15s}
.role-btn.selected,.role-btn:hover{border-color:#C48524;background:#C48524;color:#fff}
.role-icon{font-size:22px;display:block;margin-bottom:5px}
.inp{width:100%;border:1.5px solid var(--tan);border-radius:6px;padding:10px 12px;font-size:13px;font-family:inherit;background:var(--warm-white);color:var(--charcoal);margin-bottom:10px;transition:border-color .15s}
.inp:focus{outline:none;border-color:#C48524}
.btn-full{width:100%;padding:13px;border-radius:4px;border:none;background:#C48524;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:background .15s}
.btn-full:hover{background:#C48524}
.demo-hint{font-size:11px;color:var(--text-muted);text-align:center;margin-top:1rem;line-height:1.8;white-space:pre-line}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#fff;color:var(--charcoal);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto;border-right:1px solid var(--border)}
.sidebar-logo{padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);background:var(--amber)}
.sidebar-user{padding:.75rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sb-name{font-weight:600;color:var(--charcoal);font-size:12px}
.sb-loc{font-size:10px;color:var(--text-muted);margin-top:1px}
.sb-role{font-size:10px;padding:2px 8px;border-radius:3px;display:inline-block;margin-top:5px;letter-spacing:.3px;text-transform:uppercase;font-weight:700}
.r-admin{background:#6D28D9;color:#fff}
.r-manager{background:#1B4332;color:#F5DFA8}
.r-tech{background:#065F46;color:#A7F3D0}
.r-outlet{background:#B91C1C;color:#FEE2E2}
.r-founder{background:#C48524;color:#fff}
.r-design{background:#374151;color:#F9FAFB}
.r-welfare{background:#0E7490;color:#E0F2FE}
.sidebar-nav{flex:1;padding:.5rem 0}
.nav-section{padding:14px 18px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px}
.nav-item{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--charcoal);transition:all .12s;margin:1px 10px;border-radius:8px;font-weight:500}
.nav-item:hover{color:var(--charcoal);background:var(--cream)}
.nav-item.active{background:var(--amber-light);color:var(--amber-dark);font-weight:600}
.nav-item .ni{font-size:15px;width:20px;text-align:center}
.sidebar-footer{padding:.85rem 1.1rem;border-top:1px solid var(--border);font-size:12px}
.logout-btn{color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:6px;margin-top:6px;transition:color .15s;font-size:12px}
.logout-btn:hover{color:var(--amber-dark)}
.main{margin-left:220px;flex:1;padding:2rem;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.2px;color:var(--green);font-family:'Georgia',serif}
.page-sub{font-size:12px;color:var(--text-muted);margin-top:3px;letter-spacing:.2px}
.btn{padding:7px 16px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--charcoal);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#F0E9DC;border-color:#C8862E;color:#2B2824}
.btn.primary{background:var(--amber);color:#fff;border-color:var(--amber);font-weight:600}
.btn.primary:hover{background:#C48524}
.btn.success{background:#FDF6E3;color:#A06B18;border-color:#86EFAC}
.btn.danger{color:var(--red);border-color:#FECACA;background:var(--warm-white)}
.btn.danger:hover{background:#FEF2F2}
.btn.wa{background:#25D366;color:#fff;border-color:transparent}
.btn.warning{background:var(--amber-pale);color:var(--amber);border-color:#F6CC6A}
.btn.sm{padding:4px 12px;font-size:11px;border-radius:999px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.75rem}
.met{background:var(--warm-white);border-radius:8px;padding:16px 18px;border:1px solid var(--tan);position:relative;overflow:hidden;transition:box-shadow .15s}.met:hover{box-shadow:0 2px 12px rgba(27,67,50,.08)}
.met-bar{position:absolute;top:0;left:0;bottom:0;width:4px}
.ml{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:700}
.mv{font-size:28px;font-weight:800;letter-spacing:-.5px;font-family:'Georgia',serif}
.mv.r{color:var(--red)}.mv.w{color:var(--amber)}.mv.g{color:var(--green-mid)}.mv.b{color:var(--blue)}.mv.p{color:var(--purple)}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;transition:box-shadow .15s}
.card.ov{border-left:4px solid #FCA5A5}
.card.es{border-left:4px solid var(--red);background:#FFFAFA}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-title{font-size:13px;font-weight:600;flex:1;line-height:1.4;color:var(--charcoal)}
.badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;white-space:nowrap;letter-spacing:.3px;text-transform:uppercase}
.b-open{background:var(--amber-pale);color:var(--amber)}
.b-wip{background:#DBEAFE;color:#1E40AF}
.b-done{background:#FDF6E3;color:#A06B18}
.b-ov{background:#FEE2E2;color:var(--red)}
.b-esc{background:var(--red);color:#fff}
.b-high{background:#FEE2E2;color:var(--red)}
.b-med{background:var(--amber-pale);color:var(--amber)}
.b-low{background:#FDF6E3;color:#A06B18}
.b-ck{background:#E0F2FE;color:#0369A1}
.b-grey{background:var(--cream);color:var(--text-muted);border:1px solid var(--tan)}
.b-amc{background:#F3E8FF;color:#6D28D9}
.b-exp{background:var(--amber-pale);color:var(--amber)}
.card-meta{display:flex;gap:10px;font-size:12px;color:var(--text-muted);flex-wrap:wrap;align-items:center;margin-top:4px}
.card-actions{display:flex;gap:5px;margin-top:12px;padding-top:12px;border-top:1px solid var(--tan);flex-wrap:wrap}
.card-note{font-size:12px;color:var(--text-muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--cream);line-height:1.5}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,45,31,.6);z-index:2000;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--warm-white);border-radius:12px;padding:2rem;width:600px;max-width:100%;border:1px solid var(--tan);box-shadow:0 20px 60px rgba(27,67,50,.2)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--tan)}
.modal-title{font-size:16px;font-weight:700;color:#C48524;font-family:'Georgia',serif}
.fg{margin-bottom:12px}
.fg label{font-size:11px;color:var(--text-muted);font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--tan);border-radius:6px;padding:9px 11px;font-size:13px;font-family:inherit;background:var(--warm-white);color:var(--charcoal)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#C48524}
.fg textarea{min-height:70px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tbl-wrap{background:var(--warm-white);border-radius:8px;border:1px solid var(--tan);overflow:hidden;margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;background:var(--cream);border-bottom:1px solid var(--tan);text-align:left}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--cream);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--cream)}
.tfoot-row td{background:var(--cream);font-weight:700;border-top:2px solid var(--tan)}
.empty{text-align:center;padding:3rem;color:var(--tan-dark);font-size:13px;line-height:2}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:14px;font-weight:700;color:#C48524;font-family:'Georgia',serif}
.avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.notif-box{background:var(--cream);border-radius:4px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;border:1px solid var(--tan);margin-top:8px}
.tgl{position:relative;display:inline-block;width:36px;height:20px}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;cursor:pointer;inset:0;background:var(--tan);border-radius:10px;transition:.2s}
.tgl-s:before{content:"";position:absolute;height:14px;width:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tgl input:checked+.tgl-s{background:#C48524}
.tgl input:checked+.tgl-s:before{transform:translateX(16px)}
.tab-btns{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab-btn{padding:7px 16px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;transition:all .12s;letter-spacing:.2px}
.tab-btn.active{background:var(--amber);color:#fff;border-color:var(--amber)}
.tab-btn:hover:not(.active){border-color:#C48524;color:#C48524}
.timeline{border-left:2px solid var(--tan);margin-left:8px;padding-left:16px}
.tl-item{position:relative;margin-bottom:12px;font-size:12px;color:var(--text-muted);line-height:1.5}
.tl-item:before{content:"";position:absolute;left:-21px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--tan);border:2px solid var(--warm-white)}
.tl-item.done:before{background:#C48524}
.tl-item.active:before{background:var(--blue)}
.state-group{background:var(--warm-white);border-radius:4px;border:1px solid var(--tan);margin-bottom:12px;overflow:hidden}
.state-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--cream);border-bottom:1px solid var(--tan);cursor:pointer;font-weight:700;font-size:14px;color:#C48524}
.state-body{padding:14px 16px}
.loc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:4px;border:1px solid var(--tan);margin-bottom:8px;background:var(--cream)}
.loc-row:last-child{margin-bottom:0}
.amc-bar{height:5px;border-radius:3px;background:var(--tan);margin-top:8px;overflow:hidden}
.amc-bar-fill{height:100%;border-radius:3px}
.report-wrap{background:var(--warm-white);border-radius:4px;border:1px solid var(--tan);padding:24px}
.rep-stat{text-align:center;padding:12px 8px}
.rep-val{font-size:30px;font-weight:800;letter-spacing:-.5px;font-family:'Georgia',serif}
.rep-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-top:4px;font-weight:700}
.progress-bar{height:6px;border-radius:3px;background:var(--tan);overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px}
.alert-banner{display:flex;align-items:center;gap:8px;border-radius:4px;padding:10px 14px;margin-bottom:1rem;font-size:13px;font-weight:500;cursor:pointer}
@media print{.sidebar,.page-hdr .btn,.card-actions,.tab-btns,#overlay{display:none!important}.main{margin-left:0!important;padding:0!important}body{background:#fff}}
@media(max-width:768px){.sidebar{width:260px;position:fixed;top:0;left:-260px;transition:left .25s ease;height:100vh;z-index:1000}.sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.4)}.main{margin-left:0;padding:1rem;padding-top:calc(60px + env(safe-area-inset-top))}.two-col,.frow,.frow3{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flash-assign{0%,100%{background:var(--amber);box-shadow:0 0 0 0 rgba(196,133,36,.7)}50%{background:var(--amber-dark);box-shadow:0 0 0 6px rgba(196,133,36,0)}}
.btn-flash{animation:flash-assign 1.5s infinite;color:#fff!important;border-color:transparent!important;}
.sync-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:8px 14px;margin-bottom:1.25rem;font-size:12px}
#toast{position:fixed;bottom:24px;right:24px;background:#A06B18;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;max-width:320px;pointer-events:none}
/* iOS safe area */
.sidebar{padding-bottom:env(safe-area-inset-bottom)}
.main{padding-bottom:calc(1.75rem + env(safe-area-inset-bottom))}
/* Mobile improvements */
@media(max-width:768px){
  .sidebar{width:260px;z-index:1000;position:fixed;top:0;left:-260px;height:100vh;overflow-y:auto;transition:left .25s ease}
  .sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.4)}
  .main{margin-left:0;padding:1rem;padding-top:calc(60px + env(safe-area-inset-top))}
  .nav-item{padding:12px 1rem}
  .btn{padding:8px 12px}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .frow{grid-template-columns:1fr}
  .frow3{grid-template-columns:1fr}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}
  .sidebar-overlay.open{display:block}
  .mobile-topbar{display:flex;align-items:center;justify-content:space-between;background:var(--green-dark);color:#fff;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));position:fixed;top:0;left:0;right:0;z-index:998;min-height:54px;height:auto}
  .mobile-topbar-title{font-size:15px;font-weight:700}
  .hamburger{background:none;border:none;color:#fff;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:4px}
  .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .2s}
}
@media(min-width:769px){
  .mobile-topbar{display:none}


  .sidebar-overlay{display:none!important}
  .sidebar{left:0!important}
}

    .card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07);border-color:#DDD8D0}
    .metric{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid var(--border);border-left:3px solid var(--amber)}
    .metric-num{font-size:26px;font-weight:700;line-height:1;margin:6px 0;letter-spacing:-.5px}
    .metric-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted)}
    .tbl-wrap table{border-radius:10px;overflow:hidden}
    .tbl-wrap th{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
    body *{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    .page-title{letter-spacing:-.3px}
    .tab-btn{border-radius:8px;font-size:13px;padding:6px 14px;font-weight:500}
    .tab-btn.active{font-weight:600}
    </style>
</head>
<body>

<!-- Mobile topbar - shown after login via JS -->
<div class="mobile-topbar" id="mobile-topbar-el" style="display:none">
  <button class="hamburger" onclick="toggleSidebar()" id="hamburger-btn">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-topbar-title">MaintenanceOS</div>
  <div style="width:30px"></div>
</div>

<div id="toast"></div>

<!-- LOGIN -->
<div class="auth-wrap" id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-family:'Lora',Georgia,serif;font-size:12px;font-weight:400;color:var(--charcoal);letter-spacing:0;text-transform:lowercase;margin-bottom:8px">benne</div>
      <div class="auth-logo" style="font-size:28px;font-weight:700;color:#C48524">MaintenanceOS</div>
      <div style="width:40px;height:2px;background:#C48524;margin:12px auto 0;border-radius:2px"></div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:10px;letter-spacing:.5px">Maintenance management platform</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
        <button onclick="setLoginLang('en')" id="lang-en-btn" style="padding:4px 12px;border-radius:20px;border:1.5px solid var(--amber);background:var(--amber);color:#fff;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600">English</button>
        <button onclick="setLoginLang('hi')" id="lang-hi-btn" style="padding:4px 12px;border-radius:20px;border:1.5px solid var(--tan);background:transparent;color:var(--text-muted);cursor:pointer;font-size:11px;font-family:inherit;font-weight:600">हिंदी</button>
      </div>
    </div>
    <div class="fg" style="margin-bottom:14px">
      <label style="font-size:11px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px">Username / Email</label>
      <input class="inp" type="text" id="login-email" placeholder="username or email" autocomplete="email" style="margin-bottom:0" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    </div>
    <div class="fg" style="margin-bottom:8px">
      <label style="font-size:11px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px">Password</label>
      <div style="position:relative">

<script>
// ============================================================
// DATA & HELPERS
// ============================================================
let states = [];
let locations = [];
const CATEGORIES = ['Electrical','Plumbing','Gas & Appliances','HVAC / AC','Water Systems','Civil / Structural','Furniture','Cleaning','Kitchen Equipment','Other'];
const PRIORITIES = ['High','Medium','Low'];
let users = [
  {id:'u99',name:'Super Admin',email:'superadmin@benne.in',pass:'Benne@Super2026!',role:'superadmin',stateId:null,locationId:null,specialty:null,avatar:'SA'},
];
let tickets = [];
let expenses = [];
// VENDORS
let vendors = [];

// MATERIALS per ticket
let materials = [];
let estimates = [];
let designLists = []; // {id, pocId, locationId, visitDate, items:[{id,desc,category,priority,photo,status:'pending'|'approved'|'rejected',rejectReason}], status:'draft'|'submitted'|'reviewed', submittedAt, reviewedAt, reviewedBy} // {id, ticketId, addedBy, items:[{name,qty,unit,unitCost}], totalCost, status:'pending'|'approved'|'rejected', approvedBy, notes, createdAt}

// TICKET ATTACHMENTS
let attachments = [];

// TECH CHECK-INS
let checkins = [];

let amcRecords = [];
let recurringSchedules = [];
let auditLog = [];

const TODAY = new Date('2026-05-29');
let session = null, currentPage = '', NID = 20, userLang = 'english';

function getLoc(id){return locations.find(l=>l.id===id)||{name:'Unknown',type:'outlet',stateId:null};}
function getState(id){return states.find(s=>s.id===id)||{name:'Unknown'};}
function getUser(id){return users.find(u=>u.id===id);}
function getTechs(stateId){
  const allTechs = users.filter(u=>u.role==='technician'||u.role==='tech-manager');
  if(!stateId) return allTechs;
  return allTechs.filter(u=>{
    const uState = u.stateId||u.state_id;
    return !uState || uState===stateId;
  });
}
function getSupervisors(stateId){
  const allSups = users.filter(u=>u.role==='supervisor');
  if(!stateId) return allSups;
  return allSups.filter(u=>{
    const uState = u.stateId||u.state_id;
    return !uState || uState===stateId;
  });
}
function locLabel(l){
  const suffix = l.type==='central_kitchen'?' (CK)':l.type==='staff_quarters'?' (ACC)':'';
  return (l.city?l.city+' - ':'')+l.name+suffix;
}
function locDisplay(l){
  const suffix = l.type==='central_kitchen'?' (CK)':l.type==='staff_quarters'?' (ACC)':'';
  return l.city ? l.city+' - '+l.name+suffix : l.name+suffix;
}
function roleClass(r){return{admin:'r-admin',manager:'r-manager',supervisor:'r-manager',technician:'r-tech',outlet:'r-outlet',superadmin:'r-admin',founder:'r-founder','design-manager':'r-design','design-poc':'r-design',welfare:'r-welfare'}[r]||'';}
function roleLabel(r){return{admin:'Admin',manager:'Manager',supervisor:'Supervisor',technician:'Technician',outlet:'Outlet / CK',superadmin:'Super Admin',founder:'Founder','design-manager':'Design Manager','design-poc':'Design POC',welfare:'HR / Welfare'}[r]||r;}
function roleBadge(r){return`<span class="sb-role ${roleClass(r)}">${roleLabel(r)}</span>`;}
function roleColor(r){return{admin:'#7c3aed',manager:'#0369a1',supervisor:'#0369a1',technician:'#065f46',outlet:'#92400e',founder:'#C48524','design-manager':'#6B7280','design-poc':'#6B7280',welfare:'#0E7490'}[r]||'#888';}
function fc(n){return''+Number(n).toLocaleString('en-IN');}
function isOD(t){if(['Resolved','Closed'].includes(t.status))return false;if(!t.dueDate)return false;const[d,m,y]=t.dueDate.split('/');return new Date(+y,+m-1,+d)<TODAY;}
function dAgo(s){if(!s)return 0;const[d,m,y]=s.split('/');return Math.floor((TODAY-new Date(+y,+m-1,+d))/86400000);}
function isESC(t){return isOD(t)&&t.priority==='High'&&!['Resolved','Closed'].includes(t.status)&&dAgo(t.dueDate)>=3;}
function nowTs(){const n=new Date();return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear()+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function LOG(a,d,c='b'){auditLog.unshift({t:nowTs(),a,d,c});}
function priOrder(p){return{Urgent:0,Important:1,High:2,Medium:3,Low:4}[p]??3;}
function sortByUrgency(arr){return [...arr].sort((a,b)=>{if(isESC(a)&&!isESC(b))return -1;if(!isESC(a)&&isESC(b))return 1;if(isOD(a)&&!isOD(b))return -1;if(!isOD(a)&&isOD(b))return 1;return priOrder(a.priority)-priOrder(b.priority);});}
function sbadge(t){if(isESC(t))return'<span class="badge b-esc"> Escalated</span>';if(isOD(t))return'<span class="badge b-ov">Overdue</span>';const m={Open:'b-open','In Progress':'b-wip',Resolved:'b-done',Closed:'b-done','On Hold':'b-med'};return`<span class="badge ${m[t.status]||'b-open'}">${t.status}</span>`;}
function pbadge(p){
  const cls={High:'b-high',Medium:'b-med',Low:'b-low'}[p]||'b-med';
  const dot={High:'🔴',Medium:'🟡',Low:'🟢'}[p]||'';
  return`<span class="badge ${cls}">${dot} ${p}</span>`;
}
// Get locations visible to current user based on state/city scope
function visibleLocationIds(){
  // Superadmin, admin, founder always see everything
  if(['superadmin','admin','founder'].includes(session.role)) return locations.map(l=>l.id);

  // Outlet / welfare: only their own single location
  if(session.locationId) return [session.locationId];

  // Senior roles with no state assigned = see everything
  // (manager, tech-manager, design-manager without a city/state restriction)
  const seniorRoles = ['manager','tech-manager','design-manager'];
  const stateId = session.stateId || session.state_id;
  const cityName = (session.cityName || session.city_name || '').trim().toLowerCase();

  if(seniorRoles.includes(session.role) && !stateId && !cityName){
    return locations.map(l=>l.id);
  }

  // City-scoped: has both state and city
  if(stateId && cityName){
    return locations.filter(l=>{
      const sameState = (l.stateId||l.state_id) === stateId;
      const sameCity  = (l.city||'').trim().toLowerCase() === cityName;
      return sameState && sameCity;
    }).map(l=>l.id);
  }

  // State-scoped: has state but no specific city
  if(stateId){
    return locations.filter(l=>(l.stateId||l.state_id) === stateId).map(l=>l.id);
  }

  // City-only scope: no stateId but has cityName
  if(cityName){
    return locations.filter(l=>(l.city||'').trim().toLowerCase() === cityName).map(l=>l.id);
  }

  // Supervisor/technician with no scope = safety empty
  return [];
}

function visT(){
  if(session.role==='superadmin') return tickets;
  if(session.role==='founder') return tickets; // founder sees everything
  const visLocs = visibleLocationIds();
  if(['admin','manager','supervisor','design-manager','tech-manager'].includes(session.role)){
    return tickets.filter(t=>visLocs.includes(t.locationId||t.location_id));
  }
  if(session.role==='technician'){
    return tickets.filter(t=>
      (t.assignedTo===session.id||t.assigned_to===session.id) ||
      (!t.assignedTo&&!t.assigned_to&&!['Resolved','Closed'].includes(t.status)&&visLocs.includes(t.locationId||t.location_id))
    );
  }
  if(session.role==='outlet') return tickets.filter(t=>t.locationId===session.locationId||t.location_id===session.locationId);
  if(session.role==='welfare') return tickets.filter(t=>t.locationId===session.locationId||t.location_id===session.locationId);
  return[];
}
function ticketExp(id){return expenses.filter(e=>e.ticketId===id);}
function ticketExpTotal(id){return ticketExp(id).reduce((s,e)=>s+Number(e.amount),0);}
function ticketMaterials(id){return materials.filter(m=>m.ticketId===id);}
function ticketMaterialTotal(id){return materials.filter(m=>m.ticketId===id).reduce((s,m)=>s+Number(m.totalCost||m.quantity*m.unitCost),0);}
function ticketTotalCost(id){return ticketExpTotal(id)+ticketMaterialTotal(id);}
function amcDaysLeft(endDate){if(!endDate)return 9999;const[d,m,y]=endDate.split('/');return Math.floor((new Date(+y,+m-1,+d)-TODAY)/86400000);}
function amcSt(a){const d=amcDaysLeft(a.endDate);if(d<0)return'expired';if(d<60)return'expiring';return'active';}
function openModal(){document.getElementById('overlay').classList.add('open');}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function closeMO(e){if(e.target===document.getElementById('overlay'))closeModal();}
function cpText(id){const el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.innerText).catch(()=>{});const btns=(el.closest('.card')||el.parentElement).querySelectorAll('button');btns.forEach(b=>{if(b.textContent.includes('Copy')){const o=b.innerHTML;b.innerHTML='Copied!';setTimeout(()=>b.innerHTML=o,2000);}});}
function refreshPage(){
  if(!currentPage) return;
  showToast('Refreshing...');
  loadLiveData().catch(()=>navTo(currentPage));
}

</script>

function doLogin(){
  (async function(){
    const raw = (document.getElementById('login-email')?.value||'').trim();
    const pass = (document.getElementById('login-pass')?.value||'').trim();
    const email = raw.toLowerCase();
    const errEl = document.getElementById('login-error');
    if(errEl) errEl.style.display='none';

    // 1. Superadmin check (hardcoded, never in Supabase)
    if(email==='superadmin@benne.in' && pass==='Benne@Super2026!'){
      await _doLoginSuccess({id:'u99',name:'Super Admin',email:'superadmin@benne.in',role:'superadmin',stateId:null,locationId:null,avatar:'SA'});
      return;
    }

    // 2. Init Supabase if not ready
    if(!supaClient){
      try{ await initSupabase(); }catch(e){ console.warn('initSupabase failed:',e); }
    }
    // Wait up to 8 seconds
    let waited=0;
    while(!supaClient && waited<80){ await new Promise(r=>setTimeout(r,100)); waited++; }

    // If still no Supabase, try local users array as fallback
    if(!supaClient){
      const localUser = users.find(u=>(u.email===email||u.email===raw)&&u.pass===pass);
      if(localUser){ await _doLoginSuccess(localUser); return; }
      if(errEl){errEl.textContent='Connection error. Please check your internet and try again.';errEl.style.display='block';}
      return;
    }

    // 3. Try username match first, then email
    let userData = null;
    try{
      // Try as username (login field)
      let res = await supaClient.from('users').select('*').eq('email', email).eq('pass', pass).single();
      if(res.data) userData = res.data;

      if(!userData){
        // Try as username field directly
        res = await supaClient.from('users').select('*').eq('username', raw).eq('pass', pass).single();
        if(res.data) userData = res.data;
      }

      if(!userData){
        // Try username stored in email field (some users have username as email)
        res = await supaClient.from('users').select('*').ilike('email', raw).eq('pass', pass).single();
        if(res.data) userData = res.data;
      }
    }catch(e){ console.warn('Login query error:', e); }

    if(!userData){
      if(errEl){errEl.textContent='Invalid email or password. Please try again.';errEl.style.display='block';}
      return;
    }

    await _doLoginSuccess(userData);
  })();
}

      if(!['Resolved','Closed','On Hold'].includes(t.status))a+=`<button class="btn sm warning" onclick="techCheckIn('${t.id}','arrived')">📍 Arrived</button>`;

// ============================================================
// HEALTH SCORE ENGINE
// ============================================================
function calcHealthScore(locationId) {
  const locTickets = tickets.filter(t =>
    (t.locationId || t.location_id) === locationId &&
    !['Resolved','Closed'].includes(t.status)
  );

  let score = 100;

  // Open tickets (not yet assigned)
  const open = locTickets.filter(t => t.status === 'Open' && !t.assignedTo && !t.assigned_to);
  score -= Math.min(open.length * 5, 30);

  // In Progress tickets (minor deduction - work is happening)
  const inProg = locTickets.filter(t => t.status === 'In Progress');
  score -= Math.min(inProg.length * 2, 10);

  // Overdue tickets
  const overdue = locTickets.filter(t => isOD(t));
  score -= Math.min(overdue.length * 10, 30);

  // Escalated tickets
  const esc = locTickets.filter(t => isESC(t));
  score -= Math.min(esc.length * 15, 30);

  // On Hold tickets
  const onHold = locTickets.filter(t => t.status === 'On Hold');
  score -= Math.min(onHold.length * 3, 15);

  // AMC issues
  const locAMC = amcRecords.filter(a => (a.location_id || a.locationId) === locationId);
  const amcIssues = locAMC.filter(a => amcSt(a) !== 'active');
  score -= Math.min(amcIssues.length * 5, 20);

  return Math.max(0, Math.round(score));
}

function healthColor(score) {
  if (score >= 80) return { dot: '🟢', color: '#166534', bg: '#DCFCE7', label: 'Good' };
  if (score >= 60) return { dot: '🟡', color: '#B45309', bg: '#FEF3C7', label: 'Fair' };
  return { dot: '🔴', color: '#991B1B', bg: '#FEE2E2', label: 'Needs attention' };
}

function overallHealthScore() {
  const visLocs = visibleLocationIds();
  if (!visLocs.length) return 100;
  const scores = visLocs.map(id => calcHealthScore(id));
  return Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
}

// SLA ENGINE
const SLA_RULES = {High:{resolveHours:24},Medium:{resolveHours:48},Low:{resolveHours:72}};
function slaStatus(t){
  if(['Resolved','Closed'].includes(t.status)) return {pct:100,resolveStatus:'ok',hoursLeft:0};
  const rule=SLA_RULES[t.priority]||SLA_RULES.Medium;
  const created=t.createdAt||t.created_at;
  const hoursOpen=created?Math.max(0,(Date.now()-new Date(created).getTime())/(1000*60*60)):0;
  const pct=Math.min(100,Math.round(hoursOpen/rule.resolveHours*100));
  const hoursLeft=Math.max(0,rule.resolveHours-hoursOpen);
  const resolveStatus=hoursOpen>rule.resolveHours?'breached':hoursOpen>rule.resolveHours*.75?'warning':'ok';
  return{pct,resolveStatus,hoursLeft:Math.round(hoursLeft),hoursOpen:Math.round(hoursOpen),breached:resolveStatus==='breached'};
}
function slaBar(t){
  if(['Resolved','Closed'].includes(t.status)) return '';
  const s=slaStatus(t);
  const c=s.breached?'var(--red)':s.resolveStatus==='warning'?'var(--amber)':'var(--green-mid)';
  const lbl=s.breached?'SLA breached':s.resolveStatus==='warning'?'At risk':'Within SLA';
  return '<div style="margin-top:6px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span style="color:'+c+';font-weight:600">'+lbl+'</span><span style="color:var(--text-muted)">'+(s.hoursLeft>0?s.hoursLeft+'h left':s.hoursOpen+'h open')+'</span></div><div style="height:3px;background:var(--tan);border-radius:2px"><div style="height:100%;width:'+s.pct+'%;background:'+c+';border-radius:2px"></div></div></div>';
}

function applyTF(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  let f=visT();
  const st=g('tf-st'),lo=g('tf-lo'),ty=g('tf-ty'),s=g('tf-s'),p=g('tf-p');
  if(st)f=f.filter(t=>t.stateId===st||getLoc(t.locationId).stateId===st);
  if(lo)f=f.filter(t=>t.locationId===lo);
  if(ty)f=f.filter(t=>getLoc(t.locationId).type===ty);
  if(s)f=f.filter(t=>t.status===s);
  if(p)f=f.filter(t=>t.priority===p);
  document.getElementById('tlist').innerHTML=f.length?f.map(t=>ticketCard(t)).join(''):'<div class="empty">No tickets match</div>';
}

  const comment={id:'c'+Date.now(),ticket_id:ticketId,user_id:session.id,content:'Quotation requested: '+note,created_at:new Date().toISOString()};
  if(isLive){
    await dbInsert('comments',comment);
    await loadLiveData();

function addComment(id){
  const txt=document.getElementById('cmt-'+id).value.trim();if(!txt)return;
  const t=tickets.find(x=>x.id===id),ts=nowTs();
  t.comments.push({user:session.id,text:txt,time:ts});t.updatedAt=ts;
  if(t.status==='Open'&&session.role==='technician')t.status='In Progress';
  LOG('Comment added',`${t.id} by ${session.name}`,'b');openTicket(id);
}
function resolveTicket(id){
  const t=tickets.find(x=>x.id===id);if(!t)return;
  // Check if ticket has a photo attached
  const hasPhoto=attachments.some(a=>a.ticketId===id||a.ticket_id===id);
  if(!hasPhoto){
    openResolveModal(id);
    return;
  }
  openResolveModal(id);
}

function openResolveModal(id){
  const hasPhoto=attachments.some(a=>a.ticketId===id||a.ticket_id===id);
  document.getElementById('m-title').textContent='Resolve ticket';
  document.getElementById('m-body').innerHTML=`
    ${!hasPhoto?'<div style="background:#FEE2E2;border:1px solid #FCA5A5;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#991B1B"><strong>&#9888; Photo required</strong> — Please add a photo of the completed work before resolving.</div>':''}
    <div class="fg"><label>Resolution notes *</label>
      <textarea id="res-note" rows="3" placeholder="What was done to fix the issue..." style="width:100%;border:1.5px solid var(--tan);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit"></textarea>
    </div>
    ${!hasPhoto?`
    <div class="fg"><label>Resolution photo * <span style="color:#991B1B">(required)</span></label>
      <input type="file" id="res-photo" accept="image/*" style="width:100%;border:1.5px solid var(--tan);border-radius:8px;padding:8px;font-size:13px">
    </div>`:''}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="confirmResolve('${id}')">&#10003; Mark resolved</button>
    </div>
  `;
  openModal();
}

async function confirmResolve(id){
  const note=document.getElementById('res-note')?.value?.trim();
  if(!note){showToast('Please add resolution notes');return;}
  const hasPhoto=attachments.some(a=>a.ticketId===id||a.ticket_id===id);
  const photoInput=document.getElementById('res-photo');
  if(!hasPhoto&&(!photoInput||!photoInput.files||!photoInput.files.length)){
    showToast('Please attach a photo of the completed work');
    return;
  }
  // Upload resolution photo if provided
  if(photoInput&&photoInput.files&&photoInput.files.length){
    try{
      const f=photoInput.files[0];
      const attId='att'+Date.now();
      const fileUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>res(ev.target.result);r.onerror=rej;r.readAsDataURL(f);});
      const attRow={id:attId,ticket_id:id,uploaded_by:session.id,file_name:f.name,file_url:fileUrl,file_type:f.type,file_size:f.size,caption:'Resolution photo'};
      if(isLive) await dbInsert('ticket_attachments',attRow);
      attachments.push({...attRow,ticketId:id,uploadedBy:session.id,fileName:f.name,fileUrl});
    }catch(e){console.warn('Resolution photo save failed:',e);}
  }
  const t=tickets.find(x=>x.id===id);if(!t)return;
  const loc=getLoc(t.locationId||t.location_id);
  if(isLive){
    await supaClient.from('tickets').update({status:'Resolved',updated_at:new Date().toISOString()}).eq('id',id);
    await dbInsert('comments',{id:'c'+Date.now(),ticket_id:id,user_id:session.id,content:'Resolved: '+note,created_at:new Date().toISOString()});
    await dbInsert('audit_log',{id:'al'+Date.now(),action:'Ticket resolved',detail:id+' - '+t.title,user_id:session.id,color:'g'});
    await loadLiveData();
  } else {
    t.status='Resolved';t.updatedAt=nowTs();
    t.comments=t.comments||[];
    t.comments.push({id:'c'+Date.now(),user:session.id,text:'Resolved: '+note,time:nowTs()});
    LOG('Ticket resolved',t.id+' '+t.title,'g');
  }
  tgOnTicketResolved&&tgOnTicketResolved(t,loc.name,session.name);
  showToast('Ticket '+id+' resolved!');
  closeModal();
  navTo('tickets');
}

function amcFormHTML(a){
  const locChecks=states.map(s=>`
    <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin:6px 0 3px">${s.name}</div>
    ${locations.filter(l=>l.stateId===s.id).map(l=>`
      <label style="display:flex;align-items:center;gap:7px;font-size:13px;padding:3px 0;cursor:pointer">
        <input type="checkbox" value="${l.id}" ${a.locationIds&&a.locationIds.includes(l.id)?'checked':''}> ${locLabel(l)}
      </label>`).join('')}`).join('');
  return`<div class="frow">
    <div class="fg"><label>Vendor name</label><input type="text" id="av" value="${a.vendor||''}"></div>
    <div class="fg"><label>Category</label><select id="ac">${CATEGORIES.map(c=>`<option${a.category===c?' selected':''}>${c}</option>`).join('')}</select></div>
  </div>
  <div class="fg"><label>Equipment / scope</label><input type="text" id="ae" value="${a.equipment||''}" placeholder="e.g. AC Units - All outlets"></div>
  <div class="fg"><label>Coverage details</label><input type="text" id="acov" value="${a.coverage||''}" placeholder="e.g. Quarterly servicing + emergency callouts"></div>
  <div class="frow3">

    <div class="fg"><label>End date</label><input type="date" id="aed" value="${a.endDate?a.endDate.split('/').reverse().join('-'):''}"></div>
    <div class="fg"><label>Annual value (₹)</label><input type="number" id="aam" value="${a.amount||''}"></div>
  </div>
  <div class="fg"><label>Contact number</label><input type="text" id="acon" value="${a.contact||''}"></div>
  <div class="fg"><label>Locations covered</label>
    <div style="max-height:160px;overflow-y:auto;border:1.5px solid #e8e8e4;border-radius:8px;padding:8px">${locChecks}</div>
  </div>

function getAmcData(){
  const fmt=v=>{if(!v)return'';const[y,m,d]=v.split('-');return`${d}/${m}/${y}`;};
  return{vendor:document.getElementById('av').value.trim(),category:document.getElementById('ac').value,equipment:document.getElementById('ae').value.trim(),coverage:document.getElementById('acov').value.trim(),startDate:fmt(document.getElementById('as').value),endDate:fmt(document.getElementById('aed').value),amount:parseFloat(document.getElementById('aam').value)||0,contact:document.getElementById('acon').value.trim(),locationIds:[...document.querySelectorAll('#m-body input[type=checkbox]:checked')].map(c=>c.value),notes:document.getElementById('an').value.trim()};
}
function openAddAMC(){document.getElementById('m-title').textContent='Add AMC contract';document.getElementById('m-body').innerHTML=amcFormHTML({})+`<div style="display:flex;gap:7px;justify-content:flex-end;margin-top:10px"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveNewAMC()">Add contract</button></div>`;openModal();}
function openEditAMC(id){const a=amcRecords.find(x=>x.id===id);document.getElementById('m-title').textContent='Edit AMC';document.getElementById('m-body').innerHTML=amcFormHTML(a)+`<div style="display:flex;gap:7px;justify-content:flex-end;margin-top:10px"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveAMC('${id}')">Save</button></div>`;openModal();}
function saveNewAMC(){const d=getAmcData();if(!d.vendor||!d.endDate){alert('Vendor and end date required');return;}amcRecords.push({...d,id:'a'+Date.now()});LOG('AMC added',d.vendor,'p');closeModal();renderAMC();}
function saveAMC(id){const i=amcRecords.findIndex(x=>x.id===id);amcRecords[i]={...amcRecords[i],...getAmcData()};LOG('AMC updated',amcRecords[i].vendor,'b');closeModal();renderAMC();}
function deleteAMC(id){if(!confirm('Delete?'))return;amcRecords=amcRecords.filter(x=>x.id!==id);renderAMC();}
function sendAMCReminder(id){
  const a=amcRecords.find(x=>x.id===id);const days=amcDaysLeft(a.endDate);
  const msg=`AMC Renewal Reminder\n\nVendor: ${a.vendor}\nEquipment: ${a.equipment}\nContract end: ${a.endDate}\n${days<0?'Status: EXPIRED - please renew immediately':'Days remaining: '+days+' days'}\nAnnual value: ${fc(a.amount)}\n\nPlease arrange renewal at your earliest.\n\n- MaintenanceOS`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

function renderReports(){
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const monthEnd = new Date(now.getFullYear(), now.getMonth()+1, 0);
  const monthName = now.toLocaleString('default', {month:'long', year:'numeric'});

  const vis = visT();
  const monthTickets = vis.filter(t => {
    const d = new Date(t.createdAt||t.created_at||0);
    return d >= monthStart && d <= monthEnd;
  });
  const monthExp = expenses.filter(e => {
    const d = new Date(e.createdAt||e.created_at||0);
    return d >= monthStart && d <= monthEnd;
  });
  const totalExpAmt = monthExp.reduce((s,e)=>s+Number(e.amount),0);
  const resolvedThisMonth = monthTickets.filter(t=>t.status==='Resolved').length;
  const avgRes = resolvedThisMonth > 0 ? Math.round(monthTickets.filter(t=>t.status==='Resolved').length / monthTickets.length * 100) : 0;

  // By category
  const byCat = {};
  vis.forEach(t => { const c = t.category||'Other'; byCat[c]=(byCat[c]||0)+1; });

  const byLoc = {};

    const lid = t.locationId||t.location_id;
    if (!byLoc[lid]) byLoc[lid] = {open:0,resolved:0,exp:0};
    if (t.status==='Resolved') byLoc[lid].resolved++;
    else byLoc[lid].open++;

  expenses.forEach(e => {
    const t = tickets.find(x=>x.id===(e.ticketId||e.ticket_id));

  const isHidden = el.style.display === 'none';

  btn.textContent = isHidden ? 'Hide tickets' : 'Show tickets';
}

function exportToGoogleSheets() {
  const vis = visT();
  showToast('Preparing data for Google Sheets...');

  // Build CSV
  const headers = ['Ticket ID','Title','Location','City','Category','Urgency','Status','Raised By','Assigned To','Created Date','Due Date','Days Open','Expense Total'];
  const rows = vis.map(t => {
    const loc = getLoc(t.locationId||t.location_id);
    const tech = t.assignedTo||t.assigned_to ? getUser(t.assignedTo||t.assigned_to) : null;
    const exp = expenses.filter(e=>e.ticketId===t.id||e.ticket_id===t.id).reduce((s,e)=>s+Number(e.amount),0);
    const days = Math.round((Date.now()-new Date(t.createdAt||t.created_at||0).getTime())/(1000*60*60*24));
    const created = t.createdAt||t.created_at ? new Date(t.createdAt||t.created_at).toLocaleDateString('en-IN') : '';
    return [
      t.id,
      '"'+t.title.replace(/"/g,'""')+'"',
      loc.name,
      loc.city||'',
      t.category||'',
      t.priority||'',
      t.status||'',
      t.raised_by_name||t.raisedByName||'',
      tech?tech.name:'',
      created,
      t.dueDate||t.due_date||'',
      days,
      exp>0?fc(exp):'',
    ];
  });

  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);

  // Download CSV file (can be opened in Google Sheets)
  const a = document.createElement('a');
  a.href = url;
  a.download = 'MaintenanceOS_Report_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Show instructions
  setTimeout(() => {
    showToast('CSV downloaded! Open Google Sheets → File → Import to view');
  }, 1000);
}

let _userPage = 0;
let _userRoleFilter = 'All';
const USER_PAGE_SIZE = window.innerWidth <= 768 ? 5 : 10;

function setUserTab(role, btn){
  document.querySelectorAll('#user-role-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  _userRoleFilter = role;
  _userPage = 0;
  filterAndRenderUsers();
}

function filterAndRenderUsers(){
  const search = (document.getElementById('user-search')?.value||'').toLowerCase().trim();
  const role = _userRoleFilter;
  let list = users.filter(u=>u.role!=='superadmin');

  // Role filter
  if(role !== 'All'){
    const roleLower = role.toLowerCase().replace(' / ','/').replace(' ','-');
    list = list.filter(u=>
      roleLabel(u.role).toLowerCase()===role.toLowerCase() ||
      u.role===roleLower || u.role===role.toLowerCase()
    );
  }

  // Search filter
  if(search){
    list = list.filter(u=>
      (u.name||'').toLowerCase().includes(search) ||
      (u.email||'').toLowerCase().includes(search) ||
      (u.role||'').toLowerCase().includes(search) ||
      (u.user_code||'').toLowerCase().includes(search)
    );
  }

  const total = list.length;
  const pages = Math.ceil(total / USER_PAGE_SIZE);
  _userPage = Math.min(_userPage, Math.max(0, pages-1));
  const page = list.slice(_userPage * USER_PAGE_SIZE, (_userPage+1) * USER_PAGE_SIZE);

  // Render table - mobile friendly card style
  const tbl = document.getElementById('utbl');
  if(!tbl) return;

  if(!page.length){
    tbl.innerHTML = '<div class="empty">No users found</div>';
    document.getElementById('user-pagination').innerHTML = '';
    return;
  }

  // On mobile: card layout. On desktop: table
  const isMobile = window.innerWidth <= 768;
  if(isMobile){
    tbl.innerHTML = page.map(u=>{
      const s = getState(u.stateId||u.state_id||'');
      const l = getLoc(u.locationId||u.location_id||'');
      return `<div class="card" style="margin-bottom:8px;padding:12px 14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">

          ${u.cityName||u.city_name?'📍 '+(u.cityName||u.city_name):''}${l&&l.name&&l.name!=='-'?' · '+l.name:''}
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn sm" style="flex:1;justify-content:center" onclick="openEditUser('${u.id}')">✏️ Edit</button>

        </div>
      </div>`;
    }).join('');
  } else {
    tbl.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>City</th><th>Location</th><th>Actions</th></tr></thead>
      <tbody>${page.map(u=>{
        const s=getState(u.stateId||u.state_id||'');
        const l=getLoc(u.locationId||u.location_id||'');
        return `<tr>
          <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="background:${roleColor(u.role)};color:#fff">${u.avatar||'?'}</div><div><div>${u.name}</div>${u.user_code?`<div style="font-size:10px;color:var(--amber);font-weight:600">${u.user_code}</div>`:''}</div></div></td>
          <td style="color:var(--text-muted);font-size:12px">${u.email}</td>
          <td>${roleBadge(u.role)}</td>
          <td style="font-size:12px">${u.cityName||u.city_name||'-'}</td>
          <td style="font-size:12px">${l&&l.name&&l.name!=='-'?l.name:'-'}</td>
          <td><div style="display:flex;gap:5px">
            <button class="btn sm" onclick="openEditUser('${u.id}')">Edit</button>
            ${u.id!==session.id?`<button class="btn sm danger" onclick="deleteUser('${u.id}')">🗑</button>`:'<span style="font-size:11px;color:var(--text-muted)">(you)</span>'}
          </div></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }

  // Pagination
  const pg = document.getElementById('user-pagination');
  if(!pg) return;
  if(pages <= 1){ pg.innerHTML = `<div style="font-size:12px;color:var(--text-muted)">${total} users</div>`; return; }

  let paginHtml = `<div style="font-size:12px;color:var(--text-muted);width:100%;text-align:center;margin-bottom:6px">${total} users · Page ${_userPage+1} of ${pages}</div>`;
  paginHtml += `<button class="btn sm" onclick="goUserPage(0)" ${_userPage===0?'disabled':''}>«</button>`;
  paginHtml += `<button class="btn sm" onclick="goUserPage(${_userPage-1})" ${_userPage===0?'disabled':''}>‹ Prev</button>`;
  for(let i=0;i<pages;i++){
    if(i===_userPage){
      paginHtml += `<button class="btn sm primary" style="pointer-events:none">${i+1}</button>`;
    } else if(i===0||i===pages-1||Math.abs(i-_userPage)<=1){
      paginHtml += `<button class="btn sm" onclick="goUserPage(${i})">${i+1}</button>`;
    } else if(Math.abs(i-_userPage)===2){
      paginHtml += `<span style="padding:0 4px;color:var(--text-muted)">…</span>`;
    }
  }
  paginHtml += `<button class="btn sm" onclick="goUserPage(${_userPage+1})" ${_userPage===pages-1?'disabled':''}>Next ›</button>`;
  paginHtml += `<button class="btn sm" onclick="goUserPage(${pages-1})" ${_userPage===pages-1?'disabled':''}>»</button>`;
  pg.innerHTML = paginHtml;
}

async function saveProfile() {
  const name = document.getElementById('prof-name').value.trim();
  const email = document.getElementById('prof-email').value.trim().toLowerCase();
  const pass = document.getElementById('prof-pass').value;
  const wa = document.getElementById('prof-wa').value.trim();
  if (!name || !email) { alert('Name and username required'); return; }
  const updates = { name, email, whatsapp: wa || null };
  if (pass) updates.pass = pass;
  if (isLive) {
    await dbUpdate('users', session.id, updates);
    await loadLiveData();
    // Update session
    session = { ...session, ...updates };
    document.getElementById('sb-name').textContent = session.name;
    showToast('Profile updated');
  } else {
    const i = users.findIndex(u => u.id === session.id);
    if (i > -1) users[i] = { ...users[i], ...updates };
    session = { ...session, ...updates };
    document.getElementById('sb-name').textContent = session.name;
  }
  renderProfile();
}

async function saveTelegramId() {

}

async function disconnectTelegram() {
  if (!confirm('Disconnect Telegram notifications?')) return;
  if (isLive) {
    await dbUpdate('users', session.id, { telegram_id: null });
    await loadLiveData();
    session.telegram_id = null;
    showToast('Telegram disconnected');
  } else {
    session.telegram_id = null;
  }
  renderProfile();
}

// Auto-detect: polls the bot for recent messages to find this user's chat ID
async function checkTelegramAuto() {
  showToast(' Checking for your Telegram message...');
  try {
    const res = await fetch('https://api.telegram.org/bot' + TG_TOKEN + '/getUpdates?limit=20&offset=-20');
    const data = await res.json();
    if (!data.ok || !data.result?.length) {
      showToast('No messages found. Please open the bot and send /start first.');
      return;
    }
    // Find the most recent message
    const latest = data.result[data.result.length - 1];
    const chatId = latest?.message?.chat?.id || latest?.callback_query?.message?.chat?.id;
    const username = latest?.message?.from?.first_name || '';
    if (chatId) {
      document.getElementById('tg-id-input').value = chatId;
      showToast('Found your Chat ID: ' + chatId + ' - click Save to confirm');
    } else {
      showToast('Could not detect. Please paste your Chat ID manually.');
    }
  } catch(e) {
    showToast('Auto-detect failed. Please paste your Chat ID manually.');
  }
}

function showVTab(id, btn){
  ['v-approved','v-pending','v-inactive'].forEach(t=>{
    const el=document.getElementById(t);
    if(el) el.style.display = t===id ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

async function approveVendor(id){
  const v = vendors.find(x=>x.id===id);
  if(!v) return;
  if(isLive){
    await supaClient.from('vendors').update({approved:true,status:'approved'}).eq('id',id);
  }
  v.approved = true; v.status = 'approved';
  showToast('Vendor approved');
  renderVendors();
}

async function rejectVendor(id){
  const reason = prompt('Reason for rejection (optional):') || '';
  if(!isLive){
    vendors = vendors.filter(x=>x.id!==id);
  } else {
    await supaClient.from('vendors').update({approved:false,status:'rejected',reject_reason:reason}).eq('id',id);
    vendors = vendors.filter(x=>x.id!==id);
  }
  showToast('Vendor rejected');
  renderVendors();
}

function parseVendorCSV(text){
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2){alert('File is empty or has only headers');return;}
  function parseCSVLine(line){
    const res=[]; let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){res.push(cur.trim().replace(/^"|"$/g,''));cur='';}
      else{cur+=line[i];}
    }
    res.push(cur.trim().replace(/^"|"$/g,''));
    return res;
  }
  const headers=parseCSVLine(lines[0]).map(h=>h.toLowerCase().trim().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,''));
  const rows=lines.slice(1).map(l=>parseCSVLine(l));
  const nameIdx=headers.findIndex(h=>h==='name'||h.includes('vendor')||h.includes('company'));
  if(nameIdx===-1){document.getElementById('import-preview').innerHTML='<div style="color:#dc2626;font-size:13px;padding:10px">Could not find a "name" column. Check your headers.</div>';return;}
  const fi=(terms)=>headers.findIndex(h=>terms.some(t=>h.includes(t)));
  const phoneIdx=fi(['phone','mobile','contact','number']);
  const emailIdx=fi(['email','mail']);
  const specIdx=fi(['specialty','category','type','service']);
  const addrIdx=fi(['address','location','city','area']);
  const gstIdx=fi(['gst','gstin','tax']);
  const notesIdx=fi(['note','remark','comment']);
  const parsed=rows.filter(r=>r[nameIdx]?.trim()).map(r=>({
    name:r[nameIdx]?.trim()||'',
    phone:phoneIdx>-1?r[phoneIdx]?.trim()||'':'',
    email:emailIdx>-1?r[emailIdx]?.trim()||'':'',
    specialty:specIdx>-1?r[specIdx]?.trim()||'':'',
    address:addrIdx>-1?r[addrIdx]?.trim()||'':'',
    gstin:gstIdx>-1?r[gstIdx]?.trim()||'':'',
    notes:notesIdx>-1?r[notesIdx]?.trim()||'':'',
  }));
  if(!parsed.length){alert('No valid rows found');return;}
  window._vendorImport=parsed;
  document.getElementById('import-preview').innerHTML=`
    <div style="background:#d1fae5;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:13px">
      &#10003; Found <strong>${parsed.length} vendors</strong> ready to import
    </div>
    <div style="max-height:180px;overflow-y:auto;border:1px solid #e8e8e4;border-radius:8px;margin-bottom:10px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:#f9f9f7"><th style="padding:7px 10px;text-align:left;border-bottom:1px solid #e8e8e4">Name</th><th style="padding:7px 10px;text-align:left;border-bottom:1px solid #e8e8e4">Phone</th><th style="padding:7px 10px;text-align:left;border-bottom:1px solid #e8e8e4">Specialty</th></tr></thead>
        <tbody>${parsed.slice(0,15).map(v=>`<tr><td style="padding:7px 10px;border-bottom:1px solid #f4f3ef">${v.name}</td><td style="padding:7px 10px;border-bottom:1px solid #f4f3ef;color:#555">${v.phone||'-'}</td><td style="padding:7px 10px;border-bottom:1px solid #f4f3ef;color:#555">${v.specialty||'-'}</td></tr>`).join('')}
        ${parsed.length>15?`<tr><td colspan="3" style="padding:7px 10px;color:#aaa;font-style:italic">... and ${parsed.length-15} more</td></tr>`:''}
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:7px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="confirmVendorImport()">&#10003; Import ${parsed.length} vendors</button>
    </div>`;
}

async function confirmVendorImport(){
  const parsed=window._vendorImport;
  if(!parsed?.length)return;
  let imported=0,skipped=0;
  for(const v of parsed){
    if(!v.name){skipped++;continue;}
    if(vendors.find(x=>x.name.toLowerCase()===v.name.toLowerCase())){skipped++;continue;}
    const row={id:'v'+Date.now()+Math.random().toString(36).slice(2,5),...v,active:true};
    if(isLive){await dbInsert('vendors',row);}
    else{vendors.push(row);}
    imported++;
  }
  if(isLive)await loadLiveData();
  LOG('Vendors imported',imported+' vendors added','p');
  closeModal();renderVendors();
  showToast('Imported '+imported+' vendors'+(skipped>0?'  '+skipped+' duplicates skipped':''));
}

async function uploadAttachment(ticketId){
  const fileInput=document.getElementById('att-file');
  const caption=document.getElementById('att-cap').value;
  const file=fileInput?.files?.[0];
  if(!file){alert('Select a file');return;}
  const progress=document.getElementById('att-progress');
  if(progress)progress.style.display='block';

  const id='att'+Date.now();
  const fileName=id+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');

  if(isLive && supaClient){
    try{
      // Upload to Supabase Storage
      const{data,error}=await supaClient.storage.from('ticket-attachments').upload(fileName,file,{cacheControl:'3600',upsert:false});
      if(error)throw error;
      const{data:urlData}=supaClient.storage.from('ticket-attachments').getPublicUrl(fileName);
      const fileUrl=urlData.publicUrl;
      await dbInsert('ticket_attachments',{id,ticket_id:ticketId,uploaded_by:session.id,file_name:file.name,file_url:fileUrl,file_type:file.type,file_size:file.size,caption});
      await loadLiveData();
      showToast('File uploaded');
    }catch(e){
      // Fallback: store as base64 locally
      const reader=new FileReader();
      reader.onload=function(ev){
        attachments.push({id,ticketId,uploadedBy:session.id,fileName:file.name,fileUrl:ev.target.result,fileType:file.type,caption,createdAt:nowTs()});
        showToast('Saved locally (Supabase storage not configured)');
        if(progress)progress.style.display='none';
        openAttachmentsModal(ticketId);
      };
      reader.readAsDataURL(file);
      return;
    }
  } else {
    // Local mode - store as base64
    const reader=new FileReader();
    reader.onload=function(ev){
      attachments.push({id,ticketId,uploadedBy:session.id,fileName:file.name,fileUrl:ev.target.result,fileType:file.type,caption,createdAt:nowTs()});
      showToast('Photo saved');
      if(progress)progress.style.display='none';
      openAttachmentsModal(ticketId);
    };
    reader.readAsDataURL(file);
    return;
  }
  if(progress)progress.style.display='none';
  openAttachmentsModal(ticketId);
}

async function deleteAttachment(id,ticketId){
  if(!confirm('Delete this attachment?'))return;
  if(isLive){await dbDelete('ticket_attachments',id);await loadLiveData();}
  else attachments=attachments.filter(a=>a.id!==id);
  openAttachmentsModal(ticketId);
}

async function techCheckIn(ticketId, status){
  if(!navigator.geolocation){alert('Location not available on this device');return;}
  showToast(' Getting your location...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude,longitude}=pos.coords;
    const row={id:'ci'+Date.now(),ticket_id:ticketId,tech_id:session.id,status,latitude,longitude,address_approx:'Location captured'};
    if(isLive){
      await dbInsert('tech_checkins',row);
      await dbUpdate('tickets',ticketId,{updated_at:new Date().toISOString()});
    } else {
      checkins.push({...row,ticketId,techId:session.id,createdAt:nowTs()});
    }
    const msgs={on_way:' On the way to job',arrived:' Arrived at location',completed:' Job completed'};
    LOG(msgs[status]||status,ticketId+' by '+session.name,'b');
    showToast(''+( msgs[status]||status));
    // Notify manager
    const t=tickets.find(x=>x.id===ticketId);
    const loc=t?getLoc(t.locationId||t.location_id):{name:''};
    const tgMsg=`${msgs[status]}

Ticket: ${ticketId}
Location: ${loc.name}
Technician: ${session.name}
Coords: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}

https://maps.google.com/?q=${latitude},${longitude}`;
    await tgNotifyRole('manager',`<b>${msgs[status]}</b>

Ticket: ${ticketId} - ${t?t.title:''}
Location: ${loc.name}
Tech: ${session.name}

<a href="https://maps.google.com/?q=${latitude},${longitude}">📍 View on map</a>`);
    refreshPage();
  },err=>{
    showToast('Could not get location. Please enable location access.');
  });
}

async function confirmOnHold(ticketId){
  const sel=document.getElementById('hold-reason-select').value;
  const detail=document.getElementById('hold-reason').value.trim();
  if(!sel){alert('Please select a reason');return;}
  const reason=sel==='Other'?detail:sel+(detail?' - '+detail:'');
  if(!reason){alert('Please provide a reason');return;}
  const t=tickets.find(x=>x.id===ticketId);if(!t)return;
  t.status='On Hold';
  t.comments.push({user:session.id,text:' Put on hold: '+reason,time:nowTs()});
  if(isLive){
    await dbUpdate('tickets',ticketId,{status:'On Hold',updated_at:new Date().toISOString()});
    await dbInsert('ticket_comments',{id:'c'+Date.now(),ticket_id:ticketId,user_id:session.id,text:' Put on hold: '+reason});
    await dbInsert('audit_log',{id:'al'+Date.now(),action:'Ticket on hold',detail:ticketId+' - '+reason,user_id:session.id,color:'w'});
    await loadLiveData();
  }
  // Notify manager and supervisor
  const loc=getLoc(t.locationId||t.location_id);const state=getState(loc.stateId||loc.state_id);
  const msg=`⏸ <b>Ticket On Hold</b>

${ticketId} - ${t.title}
${state.name} › ${loc.name}
Tech: ${session.name}

Reason: ${reason}

Please review and advise.`;
  await tgNotifyRole('manager',msg);
  await tgNotifyRole('supervisor',msg);
  LOG('Ticket on hold',ticketId+' - '+reason,'w');
  closeModal();refreshPage();
  showToast('Ticket put on hold - manager notified');
}

  div.innerHTML=`<div class="fg" style="margin-bottom:0"><input type="text" class="ei-name" placeholder="Item name"></div><div class="fg" style="margin-bottom:0"><input type="number" class="ei-qty" placeholder="Qty" value="1" min="0.1" step="0.1"></div><div class="fg" style="margin-bottom:0"><input type="number" class="ei-cost" placeholder="Unit cost ₹"></div>`;
  container.appendChild(div);
}

async function submitEstimate(ticketId){
  const itemEls=document.querySelectorAll('#est-items .est-item');
  const items=[];
  itemEls.forEach(el=>{
    const name=el.querySelector('.ei-name')?.value?.trim();
    const qty=parseFloat(el.querySelector('.ei-qty')?.value)||1;
    const cost=parseFloat(el.querySelector('.ei-cost')?.value)||0;
    if(name)items.push({name,qty,unit:'nos',unitCost:cost});
  });
  if(!items.length){alert('Add at least one item');return;}
  const totalCost=items.reduce((s,i)=>s+i.qty*i.unitCost,0);
  const notes=document.getElementById('est-notes')?.value?.trim();
  const est={id:'est'+Date.now(),ticketId,addedBy:session.id,items,totalCost,status:'pending',notes,createdAt:nowTs()};
  estimates.push(est);
  if(isLive){
    await dbInsert('audit_log',{id:'al'+Date.now(),action:'Estimate submitted',detail:ticketId+' - '+fc(totalCost)+' by '+session.name,user_id:session.id,color:'b'});
  }
  // Notify manager
  const t=tickets.find(x=>x.id===ticketId);
  const msg=`📝 <b>Estimate Submitted - Needs Approval</b>

Ticket: ${ticketId} - ${t?t.title:''}
Total: ${fc(totalCost)}
By: ${session.name}

${items.map(i=>i.name+' x'+i.qty+' = '+fc(i.qty*i.unitCost)).join(', ')}

Please approve in MaintenanceOS.`;
  await tgNotifyRole('manager',msg);await tgNotifyRole('supervisor',msg);
  LOG('Estimate submitted',ticketId+' '+fc(totalCost),'b');
  closeModal();showToast('Estimate submitted for approval');refreshPage();
}

async function approveEstimate(estId,ticketId){
  const est=estimates.find(x=>x.id===estId);if(!est)return;
  est.status='approved';est.approvedBy=session.id;
  LOG('Estimate approved',ticketId+' '+fc(est.totalCost),'g');
  // Notify tech
  const tech=getUser(est.addedBy);
  if(tech)await tgNotifyUser(tech.id,`✅ <b>Estimate Approved</b>

Ticket: ${ticketId}
Total: ${fc(est.totalCost)}
Approved by: ${session.name}

You can now proceed with the work and convert to expense.`);
  closeModal();openEstimateModal(ticketId);showToast('Estimate approved');
}

async function rejectEstimate(estId,ticketId){
  const reason=prompt('Reason for rejection:');if(reason===null)return;
  const est=estimates.find(x=>x.id===estId);if(!est)return;
  est.status='rejected';est.rejectedReason=reason;
  LOG('Estimate rejected',ticketId,'r');
  const tech=getUser(est.addedBy);
  if(tech)await tgNotifyUser(tech.id,`❌ <b>Estimate Rejected</b>

Ticket: ${ticketId}
Reason: ${reason}
By: ${session.name}

Please revise and resubmit.`);
  closeModal();openEstimateModal(ticketId);showToast('Estimate rejected');
}

async function convertEstimateToExpense(estId,ticketId){
  const est=estimates.find(x=>x.id===estId);
  if(!est||est.status!=='approved'){alert('Estimate must be approved first');return;}
  if(!confirm('Convert this approved estimate to an expense?'))return;
  // Create one expense entry per item
  for(const item of est.items){
    const row={id:'e'+Date.now()+Math.random().toString(36).slice(2,4),ticketId,ticket_id:ticketId,addedBy:session.id,added_by:session.id,category:'Parts',description:item.name+'  '+item.qty,amount:item.qty*item.unitCost,date:nowTs().split(' ')[0],approved:true,payment_status:'pending_payment'};
    if(isLive)await dbInsert('expenses',{id:row.id,ticket_id:ticketId,added_by:session.id,category:'Parts',description:row.description,amount:row.amount,date:row.date,approved:true,payment_status:'pending_payment'});
    else expenses.push(row);
  }
  est.status='converted';
  if(isLive)await loadLiveData();
  LOG('Estimate converted to expense',ticketId+' '+fc(est.totalCost),'g');
  closeModal();showToast('Estimate converted to expense');refreshPage();
}

function promptRejectItem(listId,idx){
  const reason=prompt('Reason for rejecting this item:');
  if(reason===null)return;
  reviewItem(listId,idx,'rejected',reason);

async function reviewItem(listId,idx,status,reason){
  const l=designLists.find(x=>x.id===listId);if(!l)return;
  l.items[idx].status=status;
  l.items[idx].rejectReason=reason||'';
  // Save updated items to Supabase immediately
  if(isLive){
    await dbUpdate('design_lists',listId,{items:l.items});
  }
  const el=document.getElementById('ri-status-'+idx);
  if(el) el.innerHTML=status==='approved'?'<span style="color:var(--green-mid);font-weight:600">Approved</span>':'<span style="color:var(--red);font-weight:600">Rejected: '+reason+'</span>';
}

async function finaliseDesignReview(listId){
  const l=designLists.find(x=>x.id===listId);if(!l)return;
  const approved=l.items.filter(i=>i.status==='approved');
  if(!approved.length){alert('Approve at least one item before finalising');return;}
  if(!confirm(`Convert ${approved.length} approved items into maintenance tickets?`))return;

  l.status='reviewed';l.reviewedAt=nowTs();l.reviewedBy=session.id;
  if(isLive){
    await dbUpdate('design_lists',listId,{status:'reviewed',items:l.items,reviewed_at:new Date().toISOString(),reviewed_by:session.id});
  }
  const loc=getLoc(l.locationId);
  const ts=nowTs();
  const createdTickets=[];

  for(const item of approved){
    const tid='T'+Date.now().toString().slice(-6);
    const row={id:tid,location_id:l.locationId,state_id:loc.stateId||loc.state_id,category:item.category,title:item.desc,description:'From design team site visit - '+l.visitDate,priority:item.priority,status:'Open',raised_by:session.id,raised_by_name:'Design Team - '+session.name,due_date:''};
    if(isLive){
      await dbInsert('tickets',row);
    } else {
      tickets.unshift({...row,locationId:l.locationId,stateId:loc.stateId,raisedBy:session.id,raisedByName:'Design Team - '+session.name,assignedTo:null,dueDate:'',desc:row.description,comments:[],createdAt:ts,updatedAt:ts});
    }
    createdTickets.push(tid);
  }

  if(isLive){
    await dbInsert('audit_log',{id:'al'+Date.now(),action:'Design tickets created',detail:createdTickets.length+' tickets from '+loc.name,user_id:session.id,color:'p'});
    await loadLiveData();
  }

  // Notify all maintenance staff
  const notifMsg=`New tickets from Design Team\n\nLocation: ${(loc.city||'')} ${loc.name}\n${createdTickets.length} tickets created from site visit on ${l.visitDate}\nApproved by: ${session.name}\n\nPlease assign to technicians.`;
  await tgNotifyRole('manager',notifMsg,null,l.locationId);
  await tgNotifyRole('supervisor',notifMsg,null,l.locationId);
  await tgNotifyRole('admin',notifMsg,null,l.locationId);
  await tgNotifyRole('technician',notifMsg,null,l.locationId);
  await tgNotifyRole('founder',notifMsg,null,l.locationId);

  LOG('Design list finalised',createdTickets.length+' tickets created - '+loc.name,'g');
  closeModal();
  showToast(createdTickets.length+' tickets created and sent to maintenance queue');
  renderDesignLists();
}

// USER CODE GENERATION
// BNM = Benne Maintenance (staff), BNP = Benne Property (outlet/CK)
// ============================================================
function generateUserCode(role){
  const isOutlet = role === 'outlet';
  const prefix = isOutlet ? 'BNP' : 'BNM';
  const existing = users.filter(u => u.user_code && u.user_code.startsWith(prefix));
  const nums = existing.map(u => parseInt(u.user_code.replace(prefix,''))).filter(n=>!isNaN(n));
  const next = nums.length > 0 ? Math.max(...nums) + 1 : (isOutlet ? 1 : 100);
  return prefix + String(next).padStart(3,'0');
}

async function assignMissingUserCodes(){
  // Assign codes to users who don't have one yet
  const staffUsers = users.filter(u => !u.user_code && u.role !== 'superadmin');
  if(!staffUsers.length) return;
  
  // Sort by created_at so codes are assigned in order
  const outlets = staffUsers.filter(u => u.role === 'outlet');
  const staff = staffUsers.filter(u => u.role !== 'outlet');
  
  let bnpNum = 1;
  let bnmNum = 100;
  
  // Find existing max numbers
  users.forEach(u => {
    if(u.user_code){
      if(u.user_code.startsWith('BNP')){
        const n = parseInt(u.user_code.replace('BNP',''));
        if(!isNaN(n) && n >= bnpNum) bnpNum = n + 1;
      } else if(u.user_code.startsWith('BNM')){
        const n = parseInt(u.user_code.replace('BNM',''));
        if(!isNaN(n) && n >= bnmNum) bnmNum = n + 1;
      }
    }
  });
  
  for(const u of outlets){
    const code = 'BNP' + String(bnpNum).padStart(3,'0');
    bnpNum++;
    if(isLive) await dbUpdate('users', u.id, {user_code: code});
    else { const i = users.findIndex(x=>x.id===u.id); if(i>-1) users[i].user_code = code; }
  }
  
  for(const u of staff){
    const code = 'BNM' + String(bnmNum).padStart(3,'0');
    bnmNum++;
    if(isLive) await dbUpdate('users', u.id, {user_code: code});
    else { const i = users.findIndex(x=>x.id===u.id); if(i>-1) users[i].user_code = code; }
  }
  
  if(isLive) await loadLiveData();
  showToast('User IDs assigned to all users');
}

  document.getElementById('ri-c').value = cat;
  window._rtUrg = defaultUrg;

  const locId = document.getElementById('ri-loc')?.value || session.locationId;
  const loc = getLoc(locId||'');
  const locName = loc.name || 'outlet';

function rtVoiceRecord(){
  if(window._rtVoiceActive){
    if(window._rtMediaRecorder) window._rtMediaRecorder.stop();
    return;
  }
  if(!navigator.mediaDevices){showToast('Voice not available on this device');return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    window._rtVoiceActive=true;
    window._rtChunks=[];
    const btn=document.getElementById('rt-voice-record-btn');
    if(btn){btn.classList.add('recording');btn.innerHTML='&#9279; Recording... tap to stop';}
    const mr=new MediaRecorder(stream);
    window._rtMediaRecorder=mr;
    mr.ondataavailable=e=>window._rtChunks.push(e.data);
    mr.onstop=()=>{
      window._rtVoiceActive=false;
      stream.getTracks().forEach(t=>t.stop());
      if(btn){btn.classList.remove('recording');btn.innerHTML='&#127908; Tap to record';}
      const blob=new Blob(window._rtChunks,{type:'audio/webm'});
      const tr=document.getElementById('rt-voice-transcript');
      if(tr) tr.textContent='Voice note recorded. Transcription requires Nino API.';
      showToast('Voice note saved');
    };
    mr.start();
  }).catch(()=>showToast('Could not access microphone'));
}

    'User role: ' + roleLabel(session.role),
  ].join('. ');

  const fullSystem = NINO_SYSTEM_PROMPT + '\n\nLIVE DATA: ' + liveData;

  // Build conversation for context
  const msgs = _chatHistory.slice(-6).map(m => ({
    role: m.role === 'ai' ? 'assistant' : 'user',
    content: m.text
  }));
  if (!msgs.length || msgs[msgs.length-1].role !== 'user') {
    msgs.push({ role: 'user', content: question });
  }

  try {
    const res = await fetch(GROQ_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (window._ninoKey || localStorage.getItem('benne_nino_key') || GROQ_API_KEY)
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 600,
        messages: [
          { role: 'system', content: fullSystem },
          ...msgs.slice(-6)
        ]
      })
    });
    const data = await res.json();
    if(!res.ok){

      const typingEl2=document.getElementById(typingId);if(typingEl2)typingEl2.remove();
      addChatMessage('ai','Error: '+errMsg+(res.status===401?' - Please update your Groq API key in My Profile.':''));
      return;
    }
    const reply = data.choices?.[0]?.message?.content || 'Sorry, I could not respond. Please try again.';
    const typingEl = document.getElementById(typingId);
    if (typingEl) typingEl.remove();
    addChatMessage('ai', reply);
  } catch(e) {
    const typingEl = document.getElementById(typingId);
    if (typingEl) typingEl.remove();
    addChatMessage('ai', 'Connection error. Please check your internet and try again.');
  }
}

function startRealtime() {
  if (!supaClient) return;
  supaClient.channel('realtime-all')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tickets' }, payload => {
      showToast(' New ticket raised: ' + payload.new.title);
      if (['admin','manager'].includes(session?.role)) {
        notifyNewTicket(payload.new, payload.new.location_id);
      }
      setTimeout(() => refreshPage(), 500);
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'tickets' }, payload => {
      const t = payload.new;
      // Notify technician if assigned
      if (t.assigned_to === session?.id && payload.old.assigned_to !== t.assigned_to) {
        notifyAssigned(t, t.location_id);
        showToast(' You have been assigned: ' + t.title);

      // Notify if resolved
      if (t.status === 'Resolved' && payload.old.status !== 'Resolved') {

        if (t.raised_by === session?.id) notifyResolved(t, t.location_id);

      setTimeout(() => refreshPage(), 300);

      if (['admin','manager'].includes(session?.role)) {
        showToast(' New expense needs approval: ' + payload.new.amount);

      setTimeout(() => refreshPage(), 300);

      }
      setTimeout(() => loadLiveData(), 500);
    })
    .subscribe();
}

async function dbInsert(table, row) {
  if (!isLive) return null;
  const { data, error } = await supaClient.from(table).insert(row).select().single();
  if (error) { console.error('insert', table, error); return null; }
  return data;
}
async function dbUpdate(table, id, updates) {
  if (!isLive) return null;
  const { data, error } = await supaClient.from(table).update(updates).eq('id', id).select().single();
  if (error) { console.error('update', table, error); return null; }
  return data;
}
async function dbDelete(table, id) {
  if (!isLive) return null;
  const { error } = await supaClient.from(table).delete().eq('id', id);
  return !error;
}

async function loadLiveData() {
  if (!isLive) return;

      supaClient.from('states').select('*').order('name'),
      supaClient.from('locations').select('*').order('name'),
      supaClient.from('tickets').select('*').order('created_at',{ascending:false}).limit(500),
    ]);
    if(st.data) states = st.data;
    if(lo.data) locations = lo.data;
    if(ti.data) tickets = ti.data.map(t=>({...t,locationId:t.location_id,stateId:t.state_id,raisedBy:t.raised_by,assignedTo:t.assigned_to,dueDate:t.due_date,createdAt:t.created_at,updatedAt:t.updated_at,desc:t.description,comments:[]}));

    // Render current page immediately with critical data
    if(currentPage) navTo(currentPage);

    // Secondary data in background (non-blocking)
    Promise.all([
      supaClient.from('users').select('*').order('name'),
      supaClient.from('expenses').select('*').order('created_at',{ascending:false}),
      supaClient.from('vendors').select('*').order('name'),
      supaClient.from('amc_records').select('*').order('end_date'),
      supaClient.from('ticket_attachments').select('*').order('created_at',{ascending:false}),
