<script>

// ============================================================
// PWA - Service Worker + Push Notifications
// ============================================================

const VAPID_PUBLIC_KEY = ''; // Add your VAPID key here for push (optional)
let swRegistration = null;
let pushSubscription = null;
let notifPermission = 'default';

async function initPWA() {
  // Unregister all existing service workers to prevent stale cache issues
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) { await reg.unregister(); }
  }
  if (!('serviceWorker' in navigator)) return;
  try {
    swRegistration = await navigator.serviceWorker.register('/sw.js');
    console.log('OK Service Worker registered');
    
    // Check notification permission
    notifPermission = Notification.permission;
    
    // Listen for messages from SW
    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data?.type === 'NOTIFICATION_CLICK') {
        navTo('dashboard');
      }
    });
    
  } catch(e) {
    console.warn('SW registration failed:', e.message);
  }
}

async function requestNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  
  const permission = await Notification.requestPermission();
  notifPermission = permission;
  return permission === 'granted';
}

// Show a local push notification (works without VAPID/server)
async function pushNotify(title, body, options = {}) {
  if (Notification.permission !== 'granted') {
    const granted = await requestNotificationPermission();
    if (!granted) return;
  }
  
  const opts = {
    body,
    icon: '/icon-192.svg',
    badge: '/icon-192.svg',
    vibrate: [200, 100, 200],
    tag: 'mtos-' + Date.now(),
    ...options
  };
  
  if (swRegistration) {
    swRegistration.showNotification(title, opts);
  } else {
    new Notification(title, opts);
  }
}

// Check overdue/escalated on load and every 30 mins
function startLocalChecks() {
  checkOverdueAndEscalated();
  setInterval(checkOverdueAndEscalated, 30 * 60 * 1000);
  checkAMCAlerts();
  // Check unassigned tickets every 90 minutes
  setInterval(checkUnassignedTickets, 30 * 60 * 1000);
}

let _unassignedCheckCount = 0;
async function checkUnassignedTickets(){
  if(!session || !['admin','manager','supervisor','founder'].includes(session.role)) return;
  _unassignedCheckCount++;
  const unassigned = tickets.filter(t=>
    !t.assignedTo && !t.assigned_to &&
    !['Resolved','Closed'].includes(t.status)
  );
  if(!unassigned.length) return;
  // Push notification every time
  pushNotify('Unassigned tickets', unassigned.length + ' ticket' + (unassigned.length>1?'s':'') + ' waiting to be assigned');
  // Telegram only at 30min (count=1), 60min (count=2), 90min (count=3)
  if(_unassignedCheckCount <= 3){
    const mins = _unassignedCheckCount * 30;
    for(const t of unassigned){
      const loc = getLoc(t.locationId||t.location_id);
      await tgNotifyRole('manager', mins + ' min alert: Ticket still unassigned\n\n' + t.id + ' - ' + t.title + '\n' + locDisplay(loc) + '\n\nPlease assign a technician urgently.', null, t.locationId||t.location_id);
      await tgNotifyRole('supervisor', mins + ' min alert: Ticket still unassigned\n\n' + t.id + ' - ' + t.title + '\n' + locDisplay(loc) + '\n\nPlease assign or take this ticket.', null, t.locationId||t.location_id);
    }
  }
}

function checkOverdueAndEscalated() {
  if (!session || !['admin','manager'].includes(session.role)) return;
  tickets.forEach(t => {
    if (['Resolved','Closed'].includes(t.status)) return;
    if (isESC(t)) {
      const loc = getLoc(t.locationId), state = getState(loc.stateId);
      notifyEscalated(t, state.name + '  ' + loc.name);
    } else if (isOD(t)) {
      const loc = getLoc(t.locationId), state = getState(loc.stateId);
      notifyOverdue(t, state.name + '  ' + loc.name, dAgo(t.dueDate));
    }
  });
}

function checkAMCAlerts() {
  if (!session || !['admin','manager'].includes(session.role)) return;
  amcRecords.forEach(a => {
    const days = amcDaysLeft(a.endDate);
    if (days < 0 || days === 30 || days === 7 || days === 1) {
      notifyAMCExpiring(a.vendor, days);
    }
  });
}

async function tgSend(chatId, message) {

  } catch(e) {

// Send to users with a specific role, scoped to location
async function tgNotifyRole(role, message, excludeId = null, locationId = null) {
  let targets = users.filter(u => u.role === role && u.telegram_id && u.id !== excludeId);

  if (locationId) {
    const loc = getLoc(locationId);
    const locStateId = loc.stateId || loc.state_id;
    const locCity = (loc.city || '').toLowerCase().trim();

    targets = targets.filter(u => {
      // Admin/superadmin with no state = sees everything
      if (!u.stateId && !u.state_id) return true;
      const uStateId = u.stateId || u.state_id;
      // State must match
      if (uStateId !== locStateId) return false;
      // If user has a city scope, city must match too
      const uCity = (u.cityName || u.city_name || '').toLowerCase().trim();
      if (uCity && locCity && uCity !== locCity) return false;
      return true;
    });
  }

  for (const u of targets) {
    await tgSend(u.telegram_id, message);
  }
}

// Send to a specific user
async function tgNotifyUser(userId, message) {
  const u = getUser(userId);
  if (u && u.telegram_id) await tgSend(u.telegram_id, message);
}

// ── DRAGGABLE NINO BUTTON ────────────────────────────────────────────────────
(function(){
  function initNinoDrag(){
    const btn = document.getElementById('ai-chat-btn');
    if(!btn) return;
    let dragging=false, startX, startY, origX, origY, moved=false;
    const SIZE=56, MARGIN=12;

    function getPos(){
      const r=btn.getBoundingClientRect();
      return {x: r.left, y: r.top};
    }

    function clamp(val, min, max){ return Math.max(min, Math.min(max, val)); }

    function applyPos(x, y){
      const maxX = window.innerWidth - SIZE - MARGIN;
      const maxY = window.innerHeight - SIZE - MARGIN;
      btn.style.left = clamp(x, MARGIN, maxX) + 'px';
      btn.style.top  = clamp(y, MARGIN, maxY) + 'px';
      btn.style.right = 'auto';
      btn.style.bottom = 'auto';
    }

    function savePos(x, y){
      try { localStorage.setItem('nino_pos', JSON.stringify({x,y})); } catch(e){}
    }

    function loadPos(){
      try {
        const p = JSON.parse(localStorage.getItem('nino_pos')||'null');
        if(p && typeof p.x==='number') applyPos(p.x, p.y);
      } catch(e){}
    }

    loadPos();

    // Mouse
    btn.addEventListener('mousedown', function(e){
      dragging=true; moved=false;
      const pos=getPos();
      startX=e.clientX; startY=e.clientY;
      origX=pos.x; origY=pos.y;
      btn.style.cursor='grabbing';
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e){
      if(!dragging) return;
      const dx=e.clientX-startX, dy=e.clientY-startY;
      if(Math.abs(dx)>4||Math.abs(dy)>4) moved=true;
      applyPos(origX+dx, origY+dy);
    });
    document.addEventListener('mouseup', function(e){
      if(!dragging) return;
      dragging=false;
      btn.style.cursor='grab';
      const pos=getPos();
      savePos(pos.x, pos.y);
      if(!moved) toggleAIChat();
    });

    // Touch
    btn.addEventListener('touchstart', function(e){
      dragging=true; moved=false;
      const t=e.touches[0];
      const pos=getPos();
      startX=t.clientX; startY=t.clientY;
      origX=pos.x; origY=pos.y;
      e.preventDefault();
    },{passive:false});
    btn.addEventListener('touchmove', function(e){
      if(!dragging) return;
      const t=e.touches[0];
      const dx=t.clientX-startX, dy=t.clientY-startY;
      if(Math.abs(dx)>4||Math.abs(dy)>4) moved=true;
      applyPos(origX+dx, origY+dy);
      e.preventDefault();
    },{passive:false});
    btn.addEventListener('touchend', function(e){
      if(!dragging) return;
      dragging=false;
      const pos=getPos();
      savePos(pos.x, pos.y);
      if(!moved) toggleAIChat();
    });
  }

  // Also update Nino panel position to follow button
  const _origToggle = window.toggleAIChat;
  window.toggleAIChat = function(){
    if(typeof _origToggle === 'function') _origToggle();
    // Reposition panel near button
    const btn=document.getElementById('ai-chat-btn');
    const panel=document.getElementById('ai-chat-panel');
    if(!btn||!panel) return;
    const br=btn.getBoundingClientRect();
    const panelW=360, panelH=480;
    let left=br.right+8;
    let top=br.top;
    if(left+panelW>window.innerWidth-8) left=br.left-panelW-8;
    if(left<8) left=8;
    if(top+panelH>window.innerHeight-8) top=window.innerHeight-panelH-8;
    if(top<8) top=8;
    panel.style.left=left+'px';
    panel.style.top=top+'px';
    panel.style.bottom='auto';
    panel.style.right='auto';
  };

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', initNinoDrag);
  } else {
    initNinoDrag();
  }
})();
