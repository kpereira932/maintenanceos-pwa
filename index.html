<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MaintOS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a18">
<meta name="description" content="Multi-location restaurant maintenance management">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>MaintenanceOS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f3ef;color:#1a1a18;font-size:14px;min-height:100vh}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:#f4f3ef}
.auth-card{background:#fff;border-radius:16px;padding:2.5rem;width:400px;max-width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid #e8e8e4}
.auth-logo{font-size:24px;font-weight:800;margin-bottom:4px;letter-spacing:-.5px}
.auth-sub{font-size:13px;color:#888;margin-bottom:2rem}
.auth-roles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.role-btn{padding:12px 8px;border-radius:12px;border:2px solid #e8e8e4;background:#fff;cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:#555;font-family:inherit}
.role-btn.selected{border-color:#1a1a18;background:#1a1a18;color:#fff}
.role-icon{font-size:22px;display:block;margin-bottom:5px}
.inp{width:100%;border:1.5px solid #e8e8e4;border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a18;margin-bottom:10px}
.inp:focus{outline:none;border-color:#1a1a18}
.btn-full{width:100%;padding:12px;border-radius:10px;border:none;background:#1a1a18;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.demo-hint{font-size:11px;color:#aaa;text-align:center;margin-top:1rem;line-height:1.8;white-space:pre-line}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:#1a1a18;color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto}
.sidebar-logo{padding:1.25rem;font-size:17px;font-weight:800;letter-spacing:-.3px;border-bottom:1px solid #2a2a28}
.sidebar-user{padding:.85rem 1.25rem;border-bottom:1px solid #2a2a28}
.sb-name{font-weight:600;color:#e0e0d8;font-size:13px}
.sb-loc{font-size:11px;color:#666;margin-top:2px}
.sb-role{font-size:11px;padding:2px 8px;border-radius:6px;display:inline-block;margin-top:5px}
.r-admin{background:#7c3aed;color:#ede9fe}
.r-manager{background:#0369a1;color:#e0f2fe}
.r-tech{background:#065f46;color:#d1fae5}
.r-outlet{background:#92400e;color:#fef3c7}
.sidebar-nav{flex:1;padding:.5rem 0}
.nav-section{font-size:10px;color:#3a3a38;text-transform:uppercase;letter-spacing:1px;padding:12px 1.25rem 4px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 1.25rem;font-size:13px;color:#888;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.nav-item:hover{color:#e0e0d8;background:#252523}
.nav-item.active{color:#fff;background:#252523;border-left-color:#fff}
.nav-item .ni{font-size:15px;width:20px;text-align:center}
.sidebar-footer{padding:1rem 1.25rem;border-top:1px solid #2a2a28;font-size:12px}
.logout-btn{color:#555;cursor:pointer;display:flex;align-items:center;gap:6px;margin-top:6px}
.logout-btn:hover{color:#ccc}
.main{margin-left:230px;flex:1;padding:1.75rem;min-height:100vh}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.3px}
.page-sub{font-size:13px;color:#888;margin-top:2px}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #e0e0d8;background:#fff;color:#1a1a18;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap;text-decoration:none;font-weight:500}
.btn:hover{background:#f4f3ef}
.btn.primary{background:#1a1a18;color:#fff;border-color:transparent}
.btn.primary:hover{background:#333}
.btn.success{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.btn.danger{color:#991b1b;border-color:#fca5a5;background:#fff}
.btn.danger:hover{background:#fee2e2}
.btn.wa{background:#25D366;color:#fff;border-color:transparent}
.btn.sm{padding:4px 9px;font-size:11px;border-radius:6px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.met{background:#fff;border-radius:14px;padding:14px 16px;border:1px solid #e8e8e4;position:relative;overflow:hidden}
.met-bar{position:absolute;top:0;left:0;bottom:0;width:3px}
.ml{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.mv{font-size:26px;font-weight:800;letter-spacing:-.5px}
.mv.r{color:#dc2626}.mv.w{color:#d97706}.mv.g{color:#059669}.mv.b{color:#2563eb}.mv.p{color:#7c3aed}
.card{background:#fff;border-radius:12px;border:1px solid #e8e8e4;padding:14px 16px;margin-bottom:10px}
.card.ov{border-left:3px solid #fca5a5}
.card.es{border-left:3px solid #dc2626;background:#fffafa}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-title{font-size:13px;font-weight:600;flex:1;line-height:1.4}
.badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap}
.b-open{background:#fef3c7;color:#92400e}
.b-wip{background:#dbeafe;color:#1e40af}
.b-done{background:#d1fae5;color:#065f46}
.b-ov{background:#fee2e2;color:#991b1b}
.b-esc{background:#dc2626;color:#fff}
.b-high{background:#fee2e2;color:#991b1b}
.b-med{background:#fef3c7;color:#92400e}
.b-low{background:#d1fae5;color:#065f46}
.b-ck{background:#e0f2fe;color:#0369a1}
.b-grey{background:#f3f3ef;color:#555;border:1px solid #e8e8e4}
.b-amc{background:#f3e8ff;color:#6b21a8}
.b-exp{background:#fef9c3;color:#854d0e}
.card-meta{display:flex;gap:10px;font-size:12px;color:#888;flex-wrap:wrap;align-items:center;margin-top:4px}
.card-actions{display:flex;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0ec;flex-wrap:wrap}
.card-note{font-size:12px;color:#666;margin-top:6px;padding-top:6px;border-top:1px solid #f4f3ef;line-height:1.5}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.75rem;width:600px;max-width:100%;border:1px solid #e8e8e4;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:17px;font-weight:700}
.fg{margin-bottom:12px}
.fg label{font-size:12px;color:#555;font-weight:600;display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid #e8e8e4;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a18}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1a1a18}
.fg textarea{min-height:70px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tbl-wrap{background:#fff;border-radius:12px;border:1px solid #e8e8e4;overflow:hidden;margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;background:#f9f9f7;border-bottom:1px solid #e8e8e4;text-align:left}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f4f3ef;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.tfoot-row td{background:#f9f9f7;font-weight:700;border-top:2px solid #e8e8e4}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:13px;line-height:2}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:15px;font-weight:700}
.avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.notif-box{background:#f8f8f5;border-radius:8px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;border:1px solid #e8e8e4;margin-top:8px}
.tgl{position:relative;display:inline-block;width:36px;height:20px}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:10px;transition:.2s}
.tgl-s:before{content:"";position:absolute;height:14px;width:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tgl input:checked+.tgl-s{background:#059669}
.tgl input:checked+.tgl-s:before{transform:translateX(16px)}
.tab-btns{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab-btn{padding:7px 14px;border-radius:8px;border:1px solid #e8e8e4;background:#fff;color:#555;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500}
.tab-btn.active{background:#1a1a18;color:#fff;border-color:transparent}
.timeline{border-left:2px solid #e8e8e4;margin-left:8px;padding-left:16px}
.tl-item{position:relative;margin-bottom:12px;font-size:12px;color:#555;line-height:1.5}
.tl-item:before{content:"";position:absolute;left:-21px;top:5px;width:8px;height:8px;border-radius:50%;background:#e0e0d8;border:2px solid #fff}
.tl-item.done:before{background:#059669}
.tl-item.active:before{background:#2563eb}
.state-group{background:#fff;border-radius:12px;border:1px solid #e8e8e4;margin-bottom:12px;overflow:hidden}
.state-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#f9f9f7;border-bottom:1px solid #e8e8e4;cursor:pointer;font-weight:700;font-size:14px}
.state-body{padding:14px 16px}
.loc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;border:1px solid #f0f0ec;margin-bottom:8px;background:#fafaf8}
.loc-row:last-child{margin-bottom:0}
.amc-bar{height:6px;border-radius:3px;background:#e8e8e4;margin-top:8px;overflow:hidden}
.amc-bar-fill{height:100%;border-radius:3px}
.report-wrap{background:#fff;border-radius:12px;border:1px solid #e8e8e4;padding:24px}
.rep-stat{text-align:center;padding:12px 8px}
.rep-val{font-size:30px;font-weight:800;letter-spacing:-.5px}
.rep-lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;font-weight:600}
.progress-bar{height:8px;border-radius:4px;background:#e8e8e4;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px}
.alert-banner{display:flex;align-items:center;gap:8px;border-radius:10px;padding:10px 14px;margin-bottom:1rem;font-size:13px;font-weight:500;cursor:pointer}
@media print{.sidebar,.page-hdr .btn,.card-actions,.tab-btns,#overlay{display:none!important}.main{margin-left:0!important;padding:0!important}body{background:#fff}}
@media(max-width:768px){.sidebar{width:100%;position:relative;height:auto}.main{margin-left:0}.two-col,.frow,.frow3{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:8px 14px;margin-bottom:1.25rem;font-size:12px}
#toast{position:fixed;bottom:24px;right:24px;background:#1a1a18;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transition:opacity .3s;max-width:320px;pointer-events:none}
/* iOS safe area */
.sidebar{padding-bottom:env(safe-area-inset-bottom)}
.main{padding-bottom:calc(1.75rem + env(safe-area-inset-bottom))}
/* Mobile improvements */
@media(max-width:768px){
  .sidebar{width:220px;z-index:100}
  .main{margin-left:0;padding:1rem}
  .nav-item{padding:11px 1rem}
  .btn{padding:8px 12px}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .frow{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- LOGIN -->
<div class="auth-wrap" id="auth-screen">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:13px;font-weight:700;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">Benne</div>
      <div class="auth-logo" style="font-size:26px;font-weight:800;letter-spacing:-.5px">MaintenanceOS</div>
      <div style="width:40px;height:3px;background:#1a1a18;border-radius:2px;margin:12px auto 0"></div>
    </div>
    <div class="fg" style="margin-bottom:14px">
      <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:5px">Username / Email</label>
      <input class="inp" type="text" id="login-email" placeholder="username or email" autocomplete="email" style="margin-bottom:0" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    </div>
    <div class="fg" style="margin-bottom:8px">
      <label style="font-size:12px;font-weight:600;color:#555;display:block;margin-bottom:5px">Password</label>
      <input class="inp" type="password" id="login-pass" placeholder="Enter your password" autocomplete="current-password" style="margin-bottom:0" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="text-align:right;margin-bottom:1.5rem">
      <span onclick="showForgotPassword()" style="font-size:12px;color:#888;cursor:pointer;text-decoration:underline">Forgot password?</span>
    </div>
    <button class="btn-full" onclick="doLogin()">Sign in</button>
    <div id="login-error" style="color:#dc2626;font-size:12px;text-align:center;margin-top:10px;display:none"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo">&#9883; MaintenanceOS</div>
    <div class="sidebar-user">
      <div class="sb-name" id="sb-name"></div>
      <div class="sb-loc" id="sb-loc"></div>
      <div id="sb-role"></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div id="sync-status" style="font-size:11px;margin-bottom:8px">&#9679; Connecting...</div>
      <div class="logout-btn" onclick="doLogout()">&#8592; Sign out</div>
    </div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeMO(event)">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="m-title"></span>
      <button class="btn sm" onclick="closeModal()" style="font-size:16px;padding:3px 9px">&#215;</button>
    </div>
    <div id="m-body"></div>
  </div>
</div>

<script>
// ============================================================
// DATA & HELPERS
// ============================================================
let states = [];
let locations = [];
const CATEGORIES = ['Electrical','Plumbing','Gas & Appliances','HVAC / AC','Water Systems','Civil / Structural','Furniture','Cleaning','Kitchen Equipment','Other'];
let users = [
  {id:'u99',name:'Super Admin',email:'superadmin@benne.in',pass:'Benne@Super2026!',role:'superadmin',stateId:null,locationId:null,specialty:null,avatar:'SA'},
];
let tickets = [];
let expenses = [];
// VENDORS
let vendors = [];

// MATERIALS per ticket
let materials = [];
let estimates = []; // {id, ticketId, addedBy, items:[{name,qty,unit,unitCost}], totalCost, status:'pending'|'approved'|'rejected', approvedBy, notes, createdAt}

// TICKET ATTACHMENTS
let attachments = [];

// TECH CHECK-INS
let checkins = [];

let amcRecords = [];
let recurringSchedules = [];
let auditLog = [];

const TODAY = new Date('2026-05-29');
let session = null, currentPage = '', NID = 20;

function getLoc(id){return locations.find(l=>l.id===id)||{name:'Unknown',type:'outlet',stateId:null};}
function getState(id){return states.find(s=>s.id===id)||{name:'Unknown'};}
function getUser(id){return users.find(u=>u.id===id);}
function getTechs(stateId){return stateId?users.filter(u=>u.role==='technician'&&(!u.stateId||u.stateId===stateId)):users.filter(u=>u.role==='technician');}
function locLabel(l){return (l.city?l.city+' - ':'')+l.name+(l.type==='central_kitchen'?' (CK)':'');}
function roleClass(r){return{admin:'r-admin',manager:'r-manager',supervisor:'r-manager',technician:'r-tech',outlet:'r-outlet',superadmin:'r-admin'}[r]||'';}
function roleLabel(r){return{admin:'Admin',manager:'Manager',supervisor:'Supervisor',technician:'Technician',outlet:'Outlet / CK',superadmin:'Super Admin'}[r]||r;}
function roleBadge(r){return`<span class="sb-role ${roleClass(r)}">${roleLabel(r)}</span>`;}
function roleColor(r){return{admin:'#7c3aed',manager:'#0369a1',technician:'#065f46',outlet:'#92400e'}[r]||'#888';}
function fc(n){return'₹'+Number(n).toLocaleString('en-IN');}
function isOD(t){if(['Resolved','Closed'].includes(t.status))return false;if(!t.dueDate)return false;const[d,m,y]=t.dueDate.split('/');return new Date(+y,+m-1,+d)<TODAY;}
function dAgo(s){if(!s)return 0;const[d,m,y]=s.split('/');return Math.floor((TODAY-new Date(+y,+m-1,+d))/86400000);}
function isESC(t){return isOD(t)&&t.priority==='High'&&!['Resolved','Closed'].includes(t.status)&&dAgo(t.dueDate)>=3;}
function nowTs(){const n=new Date();return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear()+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function LOG(a,d,c='b'){auditLog.unshift({t:nowTs(),a,d,c});}
function sbadge(t){if(isESC(t))return'<span class="badge b-esc">⚠ Escalated</span>';if(isOD(t))return'<span class="badge b-ov">Overdue</span>';const m={Open:'b-open','In Progress':'b-wip',Resolved:'b-done',Closed:'b-done','On Hold':'b-med'};return`<span class="badge ${m[t.status]||'b-open'}">${t.status}</span>`;}
function pbadge(p){return`<span class="badge ${p==='High'?'b-high':p==='Low'?'b-low':'b-med'}">${p}</span>`;}
function visT(){
  if(['admin','manager','supervisor','superadmin'].includes(session.role)) return tickets;
  if(session.role==='technician') return tickets.filter(t=>
    t.assignedTo===session.id ||
    (!t.assignedTo && !['Resolved','Closed'].includes(t.status))
  );
  if(session.role==='outlet') return tickets.filter(t=>t.locationId===session.locationId);
  return[];
}
function ticketExp(id){return expenses.filter(e=>e.ticketId===id);}
function ticketExpTotal(id){return ticketExp(id).reduce((s,e)=>s+Number(e.amount),0);}
function ticketMaterials(id){return materials.filter(m=>m.ticketId===id);}
function ticketMaterialTotal(id){return materials.filter(m=>m.ticketId===id).reduce((s,m)=>s+Number(m.totalCost||m.quantity*m.unitCost),0);}
function ticketTotalCost(id){return ticketExpTotal(id)+ticketMaterialTotal(id);}
function amcDaysLeft(endDate){if(!endDate)return 9999;const[d,m,y]=endDate.split('/');return Math.floor((new Date(+y,+m-1,+d)-TODAY)/86400000);}
function amcSt(a){const d=amcDaysLeft(a.endDate);if(d<0)return'expired';if(d<60)return'expiring';return'active';}
function openModal(){document.getElementById('overlay').classList.add('open');}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function closeMO(e){if(e.target===document.getElementById('overlay'))closeModal();}
function cpText(id){const el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.innerText).catch(()=>{});const btns=(el.closest('.card')||el.parentElement).querySelectorAll('button');btns.forEach(b=>{if(b.textContent.includes('Copy')){const o=b.innerHTML;b.innerHTML='✓ Copied!';setTimeout(()=>b.innerHTML=o,2000);}});}
function refreshPage(){navTo(currentPage);}
function showT2(s,h,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById(s).style.display='';document.getElementById(h).style.display='none';}

</script>
<script>
// ============================================================
// AUTH & NAV
// ============================================================
function pickRole(r){}  // role selection removed — clean login
function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value.trim();
  const u=users.find(x=>x.email===email&&x.pass===pass);

function ticketCard(t,compact=false){
  const loc=getLoc(t.locationId),state=getState(t.stateId||loc.stateId);
  const assignee=t.assignedTo?getUser(t.assignedTo):null;
  const esc=isESC(t),od=isOD(t)&&!esc;
  const expTotal=ticketExpTotal(t.id);
  return`<div class="card${esc?' es':od?' ov':''}">
    <div class="card-top">
      <div style="flex:1"><span style="font-size:11px;color:#aaa;font-weight:600;margin-right:6px">${t.id}</span><span class="card-title">${t.title}</span></div>
      <div class="badges">${sbadge(t)} ${pbadge(t.priority)}</div>
    </div>
    <div class="card-meta">
      <span>📍 ${state.name} › ${loc.name}${loc.type==='central_kitchen'?' <span class="badge b-ck" style="font-size:10px;padding:1px 5px">CK</span>':''}</span>
      <span>📁 ${t.category}</span>
      ${assignee?`<span>🔧 ${assignee.name}</span>`:'<span style="color:#dc2626">To be assigned</span>'}
      ${t.dueDate?`<span>📅 ${t.dueDate}${isOD(t)?' (+'+dAgo(t.dueDate)+'d)':''}</span>`:''}
      ${expTotal>0?`<span style="color:#059669;font-weight:600">💰 ${fc(expTotal)}</span>`:''}
    </div>
    ${t.desc&&!compact?`<div class="card-note">${t.desc}</div>`:''}
    <div class="card-actions">${ticketActions(t)}</div>
  </div>`;
}
function ticketActions(t){
  let a=`<button class="btn sm" onclick="openTicket('${t.id}')">👁 View</button>`;
  if(['admin','manager','supervisor'].includes(session.role)){
    a+=`<button class="btn sm primary" onclick="openAssignModal('${t.id}')">👤 ${t.assignedTo?'Reassign':'Assign'}</button>`;
    if(!['Resolved','Closed'].includes(t.status))a+=`<button class="btn sm success" onclick="resolveTicket('${t.id}')">✓ Resolve</button>`;
    a+=`<button class="btn sm" onclick="openExpModal('${t.id}')">💰 Expenses</button>`;
    a+=`<button class="btn sm" onclick="openMaterialsModal('${t.id}')">🔩 Materials</button>`;
    a+=`<button class="btn sm" onclick="openAttachmentsModal('${t.id}')">📷 Photos</button>`;
  }
  if(session.role==='technician'){
    if(!t.assignedTo && !['Resolved','Closed'].includes(t.status)){
      // Unassigned — technician can grab it
      a+=`<button class="btn sm primary" onclick="assignToSelf('${t.id}')">✋ Assign to me</button>`;
    }
    if(t.assignedTo===session.id){
      if(!['Resolved','Closed','On Hold'].includes(t.status))a+=`<button class="btn sm success" onclick="resolveTicket('${t.id}')">✓ Resolve</button>`;
      a+=`<button class="btn sm primary" onclick="openTicket('${t.id}')">💬 Update</button>`;
      a+=`<button class="btn sm" onclick="openEstimateModal('${t.id}')">📝 Estimate</button>`;
      a+=`<button class="btn sm" onclick="openExpModal('${t.id}')">💰 Expense</button>`;
      a+=`<button class="btn sm" onclick="openMaterialsModal('${t.id}')">🔩 Materials</button>`;
      a+=`<button class="btn sm" onclick="openAttachmentsModal('${t.id}')">📷 Photos</button>`;
      if(!['Resolved','Closed','On Hold'].includes(t.status))a+=`<button class="btn sm warning" onclick="techCheckIn('${t.id}','on_way')">🚗 On my way</button>`;
      if(!['Resolved','Closed','On Hold'].includes(t.status))a+=`<button class="btn sm warning" onclick="techCheckIn('${t.id}','arrived')">📍 Arrived</button>`;
      if(!['Resolved','Closed','On Hold'].includes(t.status))a+=`<button class="btn sm danger" onclick="openOnHoldModal('${t.id}')">⏸ On Hold</button>`;
      if(t.status==='On Hold')a+=`<button class="btn sm success" onclick="resumeTicket('${t.id}')">▶ Resume</button>`;
    }
  }
  if(session.role==='outlet')a+=`<button class="btn sm" onclick="openTicket('${t.id}')">💬 View</button>`;
  return a;
}

function applyTF(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  let f=visT();
  const st=g('tf-st'),lo=g('tf-lo'),ty=g('tf-ty'),s=g('tf-s'),p=g('tf-p');
  if(st)f=f.filter(t=>t.stateId===st||getLoc(t.locationId).stateId===st);
  if(lo)f=f.filter(t=>t.locationId===lo);
  if(ty)f=f.filter(t=>getLoc(t.locationId).type===ty);
  if(s)f=f.filter(t=>t.status===s);
  if(p)f=f.filter(t=>t.priority===p);
  document.getElementById('tlist').innerHTML=f.length?f.map(t=>ticketCard(t)).join(''):'<div class="empty">No tickets match</div>';
}

function addComment(id){

  LOG('Comment added',`${t.id} by ${session.name}`,'b');openTicket(id);

}

function confirmAssign(id){
  const techId=document.getElementById('at-t').value;if(!techId){alert('Select a technician');return;}
  const raw=document.getElementById('at-d').value;let dd='';if(raw){const[y,m,d]=raw.split('-');dd=`${d}/${m}/${y}`;}
  const notes=document.getElementById('at-n').value,t=tickets.find(x=>x.id===id),tech=getUser(techId);
  t.assignedTo=techId;t.status='In Progress';if(dd)t.dueDate=dd;
  if(notes)t.comments.push({user:session.id,text:'Assigned: '+notes,time:nowTs()});
  LOG('Ticket assigned',`${t.id} to ${tech.name}`,'b');closeModal();refreshPage();
}

function expTable(list,showApprove){

  const grandTotal=list.reduce((s,e)=>s+Number(e.amount),0);
  return`<div class="tbl-wrap"><table>
    <thead><tr><th>Ticket</th><th>Location</th><th>Type</th><th>Description</th><th>Amount</th><th>Date</th><th>By</th><th>Approval</th><th>Payment</th>${showApprove?'<th>Action</th>':''}</tr></thead>
    <tbody>${list.map(e=>{
      const t=tickets.find(x=>x.id===e.ticketId)||{id:e.ticketId,title:'',locationId:''};
      const loc=getLoc(t.locationId),by=getUser(e.addedBy);
      return`<tr>
        <td><strong>${e.ticketId}</strong><div style="font-size:11px;color:#888">${t.title}</div></td>
        <td style="font-size:12px">${loc.name||'—'}</td>
        <td><span class="badge b-exp">${e.category}</span></td>
        <td style="font-size:12px">${e.description}</td>
        <td style="font-weight:700;color:#059669">${fc(e.amount)}</td>
        <td style="font-size:12px;color:#888">${e.date}</td>
        <td style="font-size:12px">${by?by.name:'—'}</td>
        <td>${e.approved?'<span class="badge b-done">Approved</span>':'<span class="badge b-med">Pending</span>'}</td>
        <td>${e.payment_status==='paid'?'<span class="badge b-done">Paid</span>':e.payment_status==='pending_payment'?'<span class="badge b-med">Pending payment</span>':'<span class="badge b-grey">Not paid</span>'}</td>
        ${showApprove?`<td><div style="display:flex;gap:4px">
          ${!e.approved?`<button class="btn sm success" onclick="approveExp('${e.id}')">✓ Approve</button>`:''}
          ${e.approved&&e.payment_status!=='paid'?`<button class="btn sm" onclick="markExpPaid('${e.id}')" style="color:#059669;border-color:#6ee7b7">💵 Mark paid</button>`:''}
          <button class="btn sm danger" onclick="deleteExp('${e.id}')">🗑</button>
        </div></td>`:''}
      </tr>`;
    }).join('')}

    </tbody></table></div>`;
}
function approveExp(id){const e=expenses.find(x=>x.id===id);if(e){e.approved=true;LOG('Expense approved',`${e.ticketId} — ${e.description} ${fc(e.amount)}`,'g');}renderExpenses();}
async function markExpPaid(id){
  const e=expenses.find(x=>x.id===id);if(!e)return;
  if(!confirm('Mark this expense as paid?'))return;
  e.payment_status='paid';
  if(isLive){await dbUpdate('expenses',id,{payment_status:'paid'});await loadLiveData();}
  LOG('Expense marked paid',`${e.ticketId} — ${fc(e.amount)} by ${session.name}`,'g');
  renderExpenses();
  showToast('✓ Marked as paid');
}
function deleteExp(id){if(!confirm('Delete this expense?'))return;expenses=expenses.filter(e=>e.id!==id);renderExpenses();}

function addExp(ticketId){
  const amt=parseFloat(document.getElementById('ea').value);
  const desc=document.getElementById('ed').value.trim();
  if(!amt||!desc){alert('Enter amount and description');return;}
  expenses.push({id:'e'+Date.now(),ticketId,addedBy:session.id,category:document.getElementById('ec').value,description:desc,amount:amt,date:nowTs().split(' ')[0],approved:false});
  LOG('Expense added',`${ticketId} — ${desc} ${fc(amt)} by ${session.name}`,'w');
  openExpModal(ticketId);
}

function amcCard(a){
  const st=amcSt(a),days=amcDaysLeft(a.endDate);
  const locs=a.locationIds.map(id=>getLoc(id));
  const barPct=Math.max(0,Math.min(100,days<=0?0:days>365?100:Math.floor(days/365*100)));
  const barColor=st==='expired'?'#dc2626':st==='expiring'?'#d97706':'#059669';
  const statusBadge=st==='expired'?'<span class="badge b-esc">Expired</span>':st==='expiring'?`<span class="badge b-med">Expires in ${days}d</span>`:'<span class="badge b-done">Active</span>';
  return`<div class="card${st==='expired'?' es':st==='expiring'?' ov':''}" style="margin-bottom:10px">
    <div class="card-top">
      <div style="flex:1"><div class="card-title">${a.vendor}</div><div style="font-size:12px;color:#666;margin-top:2px">${a.equipment}</div></div>
      <div class="badges">${statusBadge} <span class="badge b-grey">${a.category}</span></div>
    </div>
    <div class="card-meta">
      <span>📅 ${a.startDate} → ${a.endDate}</span>
      ${days>0&&days<=60?`<span style="color:${days<=7?'#dc2626':'#d97706'};font-weight:600">⏰ ${days} day${days===1?'':'s'} left</span>`:''}
      ${days<0?'<span style="color:#dc2626;font-weight:600">⚠ Expired '+Math.abs(days)+' days ago</span>':''}
      <span style="font-weight:600;color:#059669">💰 ${fc(a.amount)}/year</span>
      <span>📞 ${a.contact}</span>
    </div>
    <div style="font-size:12px;color:#666;margin-top:6px;margin-bottom:4px">${a.coverage}</div>
    <div style="font-size:11px;color:#aaa;margin-bottom:8px">Covers: ${locs.map(l=>l.name).join(', ')}</div>
    ${a.notes?`<div style="font-size:12px;color:#888;font-style:italic;margin-bottom:8px">${a.notes}</div>`:''}
    <div class="amc-bar"><div class="amc-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>
    ${['admin','manager'].includes(session.role)?`<div class="card-actions">
      <button class="btn sm" onclick="openEditAMC('${a.id}')">✏ Edit</button>
      <button class="btn sm wa" onclick="sendAMCReminder('${a.id}')">📲 Send reminder</button>
      <button class="btn sm danger" onclick="deleteAMC('${a.id}')">🗑</button>
    </div>`:''}
  </div>`;
}

function getAmcData(){
  const fmt=v=>{if(!v)return'';const[y,m,d]=v.split('-');return`${d}/${m}/${y}`;};
  return{vendor:document.getElementById('av').value.trim(),category:document.getElementById('ac').value,equipment:document.getElementById('ae').value.trim(),coverage:document.getElementById('acov').value.trim(),startDate:fmt(document.getElementById('as').value),endDate:fmt(document.getElementById('aed').value),amount:parseFloat(document.getElementById('aam').value)||0,contact:document.getElementById('acon').value.trim(),locationIds:[...document.querySelectorAll('#m-body input[type=checkbox]:checked')].map(c=>c.value),notes:document.getElementById('an').value.trim()};
}
function openAddAMC(){document.getElementById('m-title').textContent='Add AMC contract';document.getElementById('m-body').innerHTML=amcFormHTML({})+`<div style="display:flex;gap:7px;justify-content:flex-end;margin-top:10px"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveNewAMC()">Add contract</button></div>`;openModal();}
function openEditAMC(id){const a=amcRecords.find(x=>x.id===id);document.getElementById('m-title').textContent='Edit AMC';document.getElementById('m-body').innerHTML=amcFormHTML(a)+`<div style="display:flex;gap:7px;justify-content:flex-end;margin-top:10px"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveAMC('${id}')">Save</button></div>`;openModal();}
function saveNewAMC(){const d=getAmcData();if(!d.vendor||!d.endDate){alert('Vendor and end date required');return;}amcRecords.push({...d,id:'a'+Date.now()});LOG('AMC added',d.vendor,'p');closeModal();renderAMC();}
function saveAMC(id){const i=amcRecords.findIndex(x=>x.id===id);amcRecords[i]={...amcRecords[i],...getAmcData()};LOG('AMC updated',amcRecords[i].vendor,'b');closeModal();renderAMC();}
function deleteAMC(id){if(!confirm('Delete?'))return;amcRecords=amcRecords.filter(x=>x.id!==id);renderAMC();}
function sendAMCReminder(id){
  const a=amcRecords.find(x=>x.id===id);const days=amcDaysLeft(a.endDate);
  const msg=`AMC Renewal Reminder\n\nVendor: ${a.vendor}\nEquipment: ${a.equipment}\nContract end: ${a.endDate}\n${days<0?'Status: EXPIRED — please renew immediately':'Days remaining: '+days+' days'}\nAnnual value: ${fc(a.amount)}\n\nPlease arrange renewal at your earliest.\n\n— MaintenanceOS`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

function runCustomReport(){
  let f=tickets;
  const st=document.getElementById('cr-s').value,ty=document.getElementById('cr-ty').value,ca=document.getElementById('cr-c').value,pr=document.getElementById('cr-p').value;
  if(st)f=f.filter(t=>t.stateId===st||getLoc(t.locationId).stateId===st);
  if(ty)f=f.filter(t=>getLoc(t.locationId).type===ty);
  if(ca)f=f.filter(t=>t.category===ca);
  if(pr)f=f.filter(t=>t.priority===pr);
  const exp=expenses.filter(e=>f.some(t=>t.id===e.ticketId)).reduce((s,e)=>s+Number(e.amount),0);
  const res=f.filter(t=>t.status==='Resolved').length,op=f.filter(t=>['Open','In Progress'].includes(t.status)).length;
  document.getElementById('cr-out').innerHTML=`
    <div class="metrics">
      <div class="met"><div class="ml">Total</div><div class="mv b">${f.length}</div></div>
      <div class="met"><div class="ml">Resolved</div><div class="mv g">${res}</div></div>

}

function expenseReport(){
  const byLoc=locations.map(l=>{
    const lt=tickets.filter(t=>t.locationId===l.id);
    const le=expenses.filter(e=>lt.some(t=>t.id===e.ticketId));
    const tot=le.reduce((s,e)=>s+Number(e.amount),0);
    if(!tot)return null;
    return{loc:locLabel(l),state:getState(l.stateId).name,tot,appr:le.filter(e=>e.approved).reduce((s,e)=>s+Number(e.amount),0),pend:le.filter(e=>!e.approved).reduce((s,e)=>s+Number(e.amount),0),n:le.length};
  }).filter(Boolean).sort((a,b)=>b.tot-a.tot);
  const grand=expenses.reduce((s,e)=>s+Number(e.amount),0);
  return`<div class="report-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #f0f0ec">
      <div><div style="font-size:18px;font-weight:800">Expense Report — May 2026</div><div style="font-size:13px;color:#888">Total: ${fc(grand)}</div></div>
      <div style="display:flex;gap:8px"><button class="btn" onclick="window.print()">🖨 Print</button><button class="btn primary" onclick="openSendReport()">✉ Send</button></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Location</th><th>State</th><th>Entries</th><th>Approved</th><th>Pending</th><th>Total</th></tr></thead>
      <tbody>
        ${byLoc.map(l=>`<tr><td><strong>${l.loc}</strong></td><td style="color:#888">${l.state}</td><td>${l.n}</td><td style="color:#059669">${fc(l.appr)}</td><td style="color:#d97706">${fc(l.pend)}</td><td style="font-weight:700">${fc(l.tot)}</td></tr>`).join('')}
        <tr class="tfoot-row"><td colspan="5">Grand total</td><td style="color:#059669">${fc(grand)}</td></tr>
      </tbody>
    </table></div>
  </div>`;
}

async function updateLoc(id){
  const i=locations.findIndex(l=>l.id===id);
  const updates={name:document.getElementById('ln').value.trim(),type:document.getElementById('lt').value,stateId:document.getElementById('ls').value,city:document.getElementById('lc')?.value?.trim()||''};
  if(isLive){await dbUpdate('locations',id,{...updates,state_id:updates.stateId});await loadLiveData();}
  else locations[i]={...locations[i],...updates};
  closeModal();renderLocations();
}
function deleteLocation(id){const open=tickets.filter(t=>t.locationId===id&&!['Resolved','Closed'].includes(t.status)).length;if(open){alert(`${open} open tickets. Resolve them first.`);return;}if(!confirm('Delete?'))return;locations=locations.filter(l=>l.id!==id);users=users.map(u=>u.locationId===id?{...u,locationId:null}:u);renderLocations();}

// Auto-detect: polls the bot for recent messages to find this user's chat ID
async function checkTelegramAuto() {
  showToast('⏳ Checking for your Telegram message...');
  try {
    const res = await fetch('https://api.telegram.org/bot' + TG_TOKEN + '/getUpdates?limit=20&offset=-20');
    const data = await res.json();
    if (!data.ok || !data.result?.length) {
      showToast('No messages found. Please open the bot and send /start first.');
      return;
    }
    // Find the most recent message
    const latest = data.result[data.result.length - 1];
    const chatId = latest?.message?.chat?.id || latest?.callback_query?.message?.chat?.id;
    const username = latest?.message?.from?.first_name || '';
    if (chatId) {
      document.getElementById('tg-id-input').value = chatId;
      showToast('✓ Found your Chat ID: ' + chatId + ' - click Save to confirm');
    } else {
      showToast('Could not detect. Please paste your Chat ID manually.');
    }
  } catch(e) {
    showToast('Auto-detect failed. Please paste your Chat ID manually.');
  }
}

function parseVendorCSV(text){
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2){alert('File is empty or has only headers');return;}
  function parseCSVLine(line){
    const res=[]; let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){res.push(cur.trim().replace(/^"|"$/g,''));cur='';}
      else{cur+=line[i];}
    }
    res.push(cur.trim().replace(/^"|"$/g,''));
    return res;
  }
  const headers=parseCSVLine(lines[0]).map(h=>h.toLowerCase().trim().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,''));
  const rows=lines.slice(1).map(l=>parseCSVLine(l));
  const nameIdx=headers.findIndex(h=>h==='name'||h.includes('vendor')||h.includes('company'));
  if(nameIdx===-1){document.getElementById('import-preview').innerHTML='<div style="color:#dc2626;font-size:13px;padding:10px">Could not find a "name" column. Check your headers.</div>';return;}
  const fi=(terms)=>headers.findIndex(h=>terms.some(t=>h.includes(t)));
  const phoneIdx=fi(['phone','mobile','contact','number']);
  const emailIdx=fi(['email','mail']);
  const specIdx=fi(['specialty','category','type','service']);
  const addrIdx=fi(['address','location','city','area']);
  const gstIdx=fi(['gst','gstin','tax']);
  const notesIdx=fi(['note','remark','comment']);
  const parsed=rows.filter(r=>r[nameIdx]?.trim()).map(r=>({
    name:r[nameIdx]?.trim()||'',
    phone:phoneIdx>-1?r[phoneIdx]?.trim()||'':'',
    email:emailIdx>-1?r[emailIdx]?.trim()||'':'',
    specialty:specIdx>-1?r[specIdx]?.trim()||'':'',
    address:addrIdx>-1?r[addrIdx]?.trim()||'':'',
    gstin:gstIdx>-1?r[gstIdx]?.trim()||'':'',
    notes:notesIdx>-1?r[notesIdx]?.trim()||'':'',
  }));
  if(!parsed.length){alert('No valid rows found');return;}
  window._vendorImport=parsed;
  document.getElementById('import-preview').innerHTML=`
    <div style="background:#d1fae5;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:13px">
      &#10003; Found <strong>${parsed.length} vendors</strong> ready to import
    </div>
    <div style="max-height:180px;overflow-y:auto;border:1px solid #e8e8e4;border-radius:8px;margin-bottom:10px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:#f9f9f7"><th style="padding:7px 10px;text-align:left;border-bottom:1px solid #e8e8e4">Name</th><th style="padding:7px 10px;text-align:left;border-bottom:1px solid #e8e8e4">Phone</th><th style="padding:7px 10px;text-align:left;border-bottom:1px solid #e8e8e4">Specialty</th></tr></thead>
        <tbody>${parsed.slice(0,15).map(v=>`<tr><td style="padding:7px 10px;border-bottom:1px solid #f4f3ef">${v.name}</td><td style="padding:7px 10px;border-bottom:1px solid #f4f3ef;color:#555">${v.phone||'—'}</td><td style="padding:7px 10px;border-bottom:1px solid #f4f3ef;color:#555">${v.specialty||'—'}</td></tr>`).join('')}
        ${parsed.length>15?`<tr><td colspan="3" style="padding:7px 10px;color:#aaa;font-style:italic">... and ${parsed.length-15} more</td></tr>`:''}
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:7px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="confirmVendorImport()">&#10003; Import ${parsed.length} vendors</button>
    </div>`;
}

async function confirmVendorImport(){
  const parsed=window._vendorImport;
  if(!parsed?.length)return;
  let imported=0,skipped=0;
  for(const v of parsed){
    if(!v.name){skipped++;continue;}
    if(vendors.find(x=>x.name.toLowerCase()===v.name.toLowerCase())){skipped++;continue;}
    const row={id:'v'+Date.now()+Math.random().toString(36).slice(2,5),...v,active:true};
    if(isLive){await dbInsert('vendors',row);}
    else{vendors.push(row);}
    imported++;
  }
  if(isLive)await loadLiveData();
  LOG('Vendors imported',imported+' vendors added','p');
  closeModal();renderVendors();
  showToast('Imported '+imported+' vendors'+(skipped>0?' · '+skipped+' duplicates skipped':''));
}

async function uploadAttachment(ticketId){
  const fileInput=document.getElementById('att-file');
  const caption=document.getElementById('att-cap').value;
  const file=fileInput?.files?.[0];
  if(!file){alert('Select a file');return;}
  const progress=document.getElementById('att-progress');
  if(progress)progress.style.display='block';

  const id='att'+Date.now();
  const fileName=id+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');

  if(isLive && supaClient){
    try{
      // Upload to Supabase Storage
      const{data,error}=await supaClient.storage.from('ticket-attachments').upload(fileName,file,{cacheControl:'3600',upsert:false});
      if(error)throw error;
      const{data:urlData}=supaClient.storage.from('ticket-attachments').getPublicUrl(fileName);
      const fileUrl=urlData.publicUrl;
      await dbInsert('ticket_attachments',{id,ticket_id:ticketId,uploaded_by:session.id,file_name:file.name,file_url:fileUrl,file_type:file.type,file_size:file.size,caption});
      await loadLiveData();
      showToast('✓ File uploaded');
    }catch(e){
      // Fallback: store as base64 locally
      const reader=new FileReader();
      reader.onload=function(ev){
        attachments.push({id,ticketId,uploadedBy:session.id,fileName:file.name,fileUrl:ev.target.result,fileType:file.type,caption,createdAt:nowTs()});
        showToast('✓ Saved locally (Supabase storage not configured)');
        if(progress)progress.style.display='none';
        openAttachmentsModal(ticketId);
      };
      reader.readAsDataURL(file);
      return;
    }
  } else {
    // Local mode — store as base64
    const reader=new FileReader();
    reader.onload=function(ev){
      attachments.push({id,ticketId,uploadedBy:session.id,fileName:file.name,fileUrl:ev.target.result,fileType:file.type,caption,createdAt:nowTs()});
      showToast('✓ Photo saved');
      if(progress)progress.style.display='none';
      openAttachmentsModal(ticketId);
    };
    reader.readAsDataURL(file);
    return;
  }
  if(progress)progress.style.display='none';
  openAttachmentsModal(ticketId);
}

async function deleteAttachment(id,ticketId){
  if(!confirm('Delete this attachment?'))return;
  if(isLive){await dbDelete('ticket_attachments',id);await loadLiveData();}
  else attachments=attachments.filter(a=>a.id!==id);
  openAttachmentsModal(ticketId);
}

async function techCheckIn(ticketId, status){
  if(!navigator.geolocation){alert('Location not available on this device');return;}
  showToast('📍 Getting your location...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude,longitude}=pos.coords;
    const row={id:'ci'+Date.now(),ticket_id:ticketId,tech_id:session.id,status,latitude,longitude,address_approx:'Location captured'};
    if(isLive){
      await dbInsert('tech_checkins',row);
      await dbUpdate('tickets',ticketId,{updated_at:new Date().toISOString()});
    } else {
      checkins.push({...row,ticketId,techId:session.id,createdAt:nowTs()});
    }
    const msgs={on_way:'🚗 On the way to job',arrived:'📍 Arrived at location',completed:'✅ Job completed'};
    LOG(msgs[status]||status,ticketId+' by '+session.name,'b');
    showToast('✓ '+( msgs[status]||status));
    // Notify manager
    const t=tickets.find(x=>x.id===ticketId);
    const loc=t?getLoc(t.locationId||t.location_id):{name:''};
    const tgMsg=`${msgs[status]}

Ticket: ${ticketId}
Location: ${loc.name}
Technician: ${session.name}
Coords: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}

https://maps.google.com/?q=${latitude},${longitude}`;
    await tgNotifyRole('manager',`<b>${msgs[status]}</b>

Ticket: ${ticketId} — ${t?t.title:''}
Location: ${loc.name}
Tech: ${session.name}

<a href="https://maps.google.com/?q=${latitude},${longitude}">📍 View on map</a>`);
    refreshPage();
  },err=>{
    showToast('Could not get location. Please enable location access.');
  });
}

function toggleHoldReason(){
  const sel=document.getElementById('hold-reason-select').value;
  if(sel&&sel!=='Other') document.getElementById('hold-reason').value=sel;

async function confirmOnHold(ticketId){
  const sel=document.getElementById('hold-reason-select').value;
  const detail=document.getElementById('hold-reason').value.trim();
  if(!sel){alert('Please select a reason');return;}
  const reason=sel==='Other'?detail:sel+(detail?' - '+detail:'');
  if(!reason){alert('Please provide a reason');return;}
  const t=tickets.find(x=>x.id===ticketId);if(!t)return;
  t.status='On Hold';
  t.comments.push({user:session.id,text:'⏸ Put on hold: '+reason,time:nowTs()});
  if(isLive){
    await dbUpdate('tickets',ticketId,{status:'On Hold',updated_at:new Date().toISOString()});
    await dbInsert('ticket_comments',{id:'c'+Date.now(),ticket_id:ticketId,user_id:session.id,text:'⏸ Put on hold: '+reason});
    await dbInsert('audit_log',{id:'al'+Date.now(),action:'Ticket on hold',detail:ticketId+' - '+reason,user_id:session.id,color:'w'});
    await loadLiveData();
  }
  // Notify manager and supervisor
  const loc=getLoc(t.locationId||t.location_id);const state=getState(loc.stateId||loc.state_id);
  const msg=`⏸ <b>Ticket On Hold</b>

${ticketId} — ${t.title}
${state.name} › ${loc.name}
Tech: ${session.name}

Reason: ${reason}

Please review and advise.`;
  await tgNotifyRole('manager',msg);
  await tgNotifyRole('supervisor',msg);
  LOG('Ticket on hold',ticketId+' - '+reason,'w');
  closeModal();refreshPage();
  showToast('Ticket put on hold — manager notified');
}

async function submitEstimate(ticketId){
  const itemEls=document.querySelectorAll('#est-items .est-item');
  const items=[];
  itemEls.forEach(el=>{
    const name=el.querySelector('.ei-name')?.value?.trim();
    const qty=parseFloat(el.querySelector('.ei-qty')?.value)||1;
    const cost=parseFloat(el.querySelector('.ei-cost')?.value)||0;
    if(name)items.push({name,qty,unit:'nos',unitCost:cost});
  });
  if(!items.length){alert('Add at least one item');return;}
  const totalCost=items.reduce((s,i)=>s+i.qty*i.unitCost,0);
  const notes=document.getElementById('est-notes')?.value?.trim();
  const est={id:'est'+Date.now(),ticketId,addedBy:session.id,items,totalCost,status:'pending',notes,createdAt:nowTs()};
  estimates.push(est);
  if(isLive){
    await dbInsert('audit_log',{id:'al'+Date.now(),action:'Estimate submitted',detail:ticketId+' - '+fc(totalCost)+' by '+session.name,user_id:session.id,color:'b'});
  }
  // Notify manager
  const t=tickets.find(x=>x.id===ticketId);
  const msg=`📝 <b>Estimate Submitted — Needs Approval</b>

Ticket: ${ticketId} — ${t?t.title:''}
Total: ${fc(totalCost)}
By: ${session.name}

${items.map(i=>i.name+' × '+i.qty+' = '+fc(i.qty*i.unitCost)).join('
')}

Please approve in MaintenanceOS.`;
  await tgNotifyRole('manager',msg);await tgNotifyRole('supervisor',msg);
  LOG('Estimate submitted',ticketId+' '+fc(totalCost),'b');
  closeModal();showToast('✓ Estimate submitted for approval');refreshPage();
}

async function approveEstimate(estId,ticketId){
  const est=estimates.find(x=>x.id===estId);if(!est)return;
  est.status='approved';est.approvedBy=session.id;
  LOG('Estimate approved',ticketId+' '+fc(est.totalCost),'g');
  // Notify tech
  const tech=getUser(est.addedBy);
  if(tech)await tgNotifyUser(tech.id,`✅ <b>Estimate Approved</b>

Ticket: ${ticketId}
Total: ${fc(est.totalCost)}
Approved by: ${session.name}

You can now proceed with the work and convert to expense.`);
  closeModal();openEstimateModal(ticketId);showToast('✓ Estimate approved');
}

async function rejectEstimate(estId,ticketId){
  const reason=prompt('Reason for rejection:');if(reason===null)return;
  const est=estimates.find(x=>x.id===estId);if(!est)return;
  est.status='rejected';est.rejectedReason=reason;
  LOG('Estimate rejected',ticketId,'r');
  const tech=getUser(est.addedBy);
  if(tech)await tgNotifyUser(tech.id,`❌ <b>Estimate Rejected</b>

Ticket: ${ticketId}
Reason: ${reason}
By: ${session.name}

Please revise and resubmit.`);
  closeModal();openEstimateModal(ticketId);showToast('Estimate rejected');
}

async function convertEstimateToExpense(estId,ticketId){
  const est=estimates.find(x=>x.id===estId);
  if(!est||est.status!=='approved'){alert('Estimate must be approved first');return;}
  if(!confirm('Convert this approved estimate to an expense?'))return;
  // Create one expense entry per item
  for(const item of est.items){
    const row={id:'e'+Date.now()+Math.random().toString(36).slice(2,4),ticketId,ticket_id:ticketId,addedBy:session.id,added_by:session.id,category:'Parts',description:item.name+' × '+item.qty,amount:item.qty*item.unitCost,date:nowTs().split(' ')[0],approved:true,payment_status:'pending_payment'};
    if(isLive)await dbInsert('expenses',{id:row.id,ticket_id:ticketId,added_by:session.id,category:'Parts',description:row.description,amount:row.amount,date:row.date,approved:true,payment_status:'pending_payment'});
    else expenses.push(row);
  }
  est.status='converted';
  if(isLive)await loadLiveData();
  LOG('Estimate converted to expense',ticketId+' '+fc(est.totalCost),'g');
  closeModal();showToast('✓ Estimate converted to expense');refreshPage();
}

async function initSupabase() {
  try {
    supaClient = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    const { data, error } = await supaClient.from('states').select('id').limit(1);
    if (error) throw error;
    isLive = true;
    console.log('✓ Supabase connected — LIVE MODE');
    updateSyncBar(true);
    startRealtime();
  } catch(e) {
    console.warn('Supabase offline, local mode:', e.message);
    isLive = false;
    updateSyncBar(false);
  }
}

function updateSyncBar(live) {
  const bar = document.getElementById('sync-status');
  if (!bar) return;
  bar.innerHTML = live
    ? '<span style="width:8px;height:8px;border-radius:50%;background:#059669;display:inline-block;animation:pulse 2s infinite"></span> <span style="color:#059669;font-weight:600">Live</span> <span style="color:#555;font-size:10px">Real-time sync active</span>'
    : '<span style="width:8px;height:8px;border-radius:50%;background:#d97706;display:inline-block"></span> <span style="color:#d97706;font-weight:600">Local mode</span>';
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 4000);
}

function startRealtime() {
  if (!supaClient) return;
  supaClient.channel('realtime-all')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tickets' }, payload => {
      showToast('🔔 New ticket raised: ' + payload.new.title);
      if (['admin','manager'].includes(session?.role)) {
        notifyNewTicket(payload.new, payload.new.location_id);
      }
      setTimeout(() => refreshPage(), 500);
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'tickets' }, payload => {
      const t = payload.new;
      // Notify technician if assigned
      if (t.assigned_to === session?.id && payload.old.assigned_to !== t.assigned_to) {
        notifyAssigned(t, t.location_id);
        showToast('👷 You have been assigned: ' + t.title);
      }
      // Notify if resolved
      if (t.status === 'Resolved' && payload.old.status !== 'Resolved') {
        showToast('✅ Resolved: ' + t.title);
        if (t.raised_by === session?.id) notifyResolved(t, t.location_id);
      }
      setTimeout(() => refreshPage(), 300);
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'expenses' }, payload => {
      if (['admin','manager'].includes(session?.role)) {
        showToast('💰 New expense needs approval: ₹' + payload.new.amount);
        notifyExpenseApproval(payload.new);
      }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'ticket_comments' }, payload => {
      showToast('💬 New comment on ticket ' + payload.new.ticket_id);
      setTimeout(() => refreshPage(), 300);
    })
    .subscribe();
}

async function dbInsert(table, row) {
  if (!isLive) return null;
  const { data, error } = await supaClient.from(table).insert(row).select().single();
  if (error) { console.error('insert', table, error); return null; }
  return data;
}
async function dbUpdate(table, id, updates) {
  if (!isLive) return null;
  const { data, error } = await supaClient.from(table).update(updates).eq('id', id).select().single();
  if (error) { console.error('update', table, error); return null; }
  return data;
}
async function dbDelete(table, id) {
  if (!isLive) return null;
  const { error } = await supaClient.from(table).delete().eq('id', id);
  return !error;
}

async function loadLiveData() {
  if (!isLive) return;
  showToast('⏳ Loading live data...');
  try {
    const [st,lo,us,ti,ex,am,re,al,cm,vn,mt,att,ci] = await Promise.all([
      supaClient.from('states').select('*').order('name'),
      supaClient.from('locations').select('*').order('name'),
      supaClient.from('users').select('*').order('name'),
      supaClient.from('tickets').select('*').order('created_at',{ascending:false}),
      supaClient.from('expenses').select('*').order('created_at',{ascending:false}),
      supaClient.from('amc_records').select('*').order('end_date'),
      supaClient.from('recurring_schedules').select('*'),
      supaClient.from('audit_log').select('*').order('created_at',{ascending:false}).limit(100),
      supaClient.from('ticket_comments').select('*').order('created_at'),
      supaClient.from('vendors').select('*').order('name'),
      supaClient.from('materials').select('*').order('created_at',{ascending:false}),
      supaClient.from('ticket_attachments').select('*').order('created_at',{ascending:false}),
      supaClient.from('tech_checkins').select('*').order('created_at',{ascending:false}),
    ]);
    if (st.data) states = st.data;
    if (lo.data) locations = lo.data.map(l=>({...l,stateId:l.state_id}));
    if (us.data) users = us.data.map(u=>({...u,stateId:u.state_id,locationId:u.location_id}));
    if (ti.data) tickets = ti.data.map(t=>({...t,locationId:t.location_id,stateId:t.state_id,raisedBy:t.raised_by,assignedTo:t.assigned_to,dueDate:t.due_date,desc:t.description,comments:[]}));
    if (cm.data) cm.data.forEach(c=>{ const t=tickets.find(x=>x.id===c.ticket_id); if(t) t.comments.push({user:c.user_id,text:c.text,time:c.created_at?.slice(0,16).replace('T',' ')}); });
    if (ex.data) expenses = ex.data.map(e=>({...e,ticketId:e.ticket_id,addedBy:e.added_by}));
    if (am.data) amcRecords = am.data.map(a=>({...a,locationIds:a.location_ids||[],startDate:a.start_date,endDate:a.end_date}));
    if (re.data) recurringSchedules = re.data.map(r=>({...r,locationIds:r.location_ids||[],next:r.next_due,on:r.active}));
    if (al.data) auditLog = al.data.map(e=>({t:e.created_at?.slice(0,16).replace('T',' '),a:e.action,d:e.detail||'',c:e.color||'b'}));
    if (vn.data) vendors = vn.data;
    if (mt.data) materials = mt.data.map(m=>({...m,ticketId:m.ticket_id,addedBy:m.added_by,unitCost:m.unit_cost,totalCost:m.total_cost,vendorId:m.vendor_id}));
    if (att.data) attachments = att.data.map(a=>({...a,ticketId:a.ticket_id,uploadedBy:a.uploaded_by,fileName:a.file_name,fileUrl:a.file_url,fileType:a.file_type}));
    if (ci.data) checkins = ci.data.map(c=>({...c,ticketId:c.ticket_id,techId:c.tech_id}));
    showToast('✓ Live data loaded');
  } catch(e) {
    console.error('loadLiveData error',e);
    showToast('⚠ Using demo data');
  }
}

// Override login to use Supabase
const _origLogin = doLogin;
window.doLogin = async function() {
  const email = document.getElementById('login-email')?.value?.trim()?.toLowerCase();
  const pass = document.getElementById('login-pass')?.value?.trim();
  if (isLive) {
    const { data, error } = await supaClient.from('users').select('*').eq('email',email).eq('pass',pass).single();
    
    // If not found in Supabase, check local users (superadmin is local-only for security)
    let userData = data;
    if (error || !data) {
      const localUser = users.find(u => u.email === email && u.pass === pass);
      if (localUser) {
        userData = localUser;
      } else {
        const errEl = document.getElementById('login-error');
        if (errEl) { errEl.textContent = 'Invalid email or password. Please try again.'; errEl.style.display = 'block'; }
        return;
      }
    }
    session = {...userData, stateId: userData.state_id||userData.stateId, locationId: userData.location_id||userData.locationId};
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('sb-name').textContent=session.name;
    document.getElementById('sb-role').innerHTML=roleBadge(session.role);
    let locStr='Locations';
    if(session.locationId){const l=getLoc(session.locationId);locStr=getState(l.stateId||l.state_id).name+' › '+l.name;}
    else if(session.stateId){locStr=getState(session.stateId).name+' region';}
    document.getElementById('sb-loc').textContent=locStr;
    await loadLiveData();
    buildNav();
    navTo({admin:'locations',manager:'dashboard',supervisor:'dashboard',technician:'my-tasks',outlet:'raise',superadmin:'superadmin'}[session.role]||'dashboard');
    // Ask for notification permission after login
    setTimeout(askNotificationPermission, 2000);
    setTimeout(showInstallBanner, 5000);
    startLocalChecks();
  } else {
    _origLogin();
    setTimeout(askNotificationPermission, 2000);
    startLocalChecks();
  }
};

// Override save operations to write to Supabase
window.submitTicket = async function() {
  const raisedByName=document.getElementById('ri-name')?.value?.trim();
  const title=document.getElementById('ri-t')?.value?.trim();
  if(!raisedByName){
    document.getElementById('ri-name').style.borderColor='#dc2626';
    alert('Please enter your name before submitting');
    document.getElementById('ri-name').focus();
    return;
  }
  if(!title){alert('Enter a title');return;}

  // Determine location
  let locationId = session.locationId; // outlet uses their own
  if(['admin','manager','technician'].includes(session.role)){
    const locEl = document.getElementById('ri-loc');
    locationId = locEl ? locEl.value : null;
    if(!locationId){alert('Please select a location');return;}
  }

  const loc=getLoc(locationId);
  const raw=document.getElementById('ri-dd')?.value;
  let dd='';if(raw){const[y,m,d]=raw.split('-');dd=d+'/'+m+'/'+y;}
  const id='T'+Date.now().toString().slice(-6);
  const row={id,location_id:locationId,state_id:loc.stateId||loc.state_id,category:document.getElementById('ri-c')?.value,title,description:document.getElementById('ri-d')?.value,priority:document.getElementById('ri-p')?.value,status:'Open',raised_by:session.id,raised_by_name:raisedByName,due_date:dd};

  if(isLive){
    await dbInsert('tickets',row);
    await dbInsert('audit_log',{id:'al'+Date.now(),action:'Ticket raised',detail:id+' '+title+' - '+loc.name,user_id:session.id,color:'p'});
    await loadLiveData();
    showToast('✓ Ticket '+id+' submitted!');
    // Telegram notification
    const _loc=getLoc(locationId), _state=getState(_loc.stateId||_loc.state_id);
    tgOnTicketRaised({id,title,category:row.category,priority:row.priority,raised_by:session.id}, _loc.name, _state.name, session.name);
  }else{
    tickets.unshift({...row,locationId,stateId:loc.stateId,raisedBy:session.id,assignedTo:null,dueDate:dd,desc:row.description,comments:[],createdAt:nowTs(),updatedAt:nowTs()});
    LOG('Ticket raised',id+' '+title,'p');
    alert('Ticket '+id+' submitted!');
  }
  // Redirect based on role
  if(['admin','manager'].includes(session.role)) navTo('tickets');
  else navTo('my-tasks');
};

    await dbInsert('ticket_comments',{id:'c'+Date.now(),ticket_id:id,user_id:session.id,text:txt});
    await dbUpdate('tickets',id,{updated_at:new Date().toISOString(),status:t?.status==='Open'&&session.role==='technician'?'In Progress':t?.status});
    await dbInsert('audit_log',{id:'al'+Date.now(),action:'Comment added',detail:id+' by '+session.name,user_id:session.id,color:'b'});
    await loadLiveData();
    // Telegram notification
    const _ct=tickets.find(x=>x.id===id)||{};
    const _cloc=getLoc(_ct.location_id||_ct.locationId), _cstate=getState(_cloc.stateId||_cloc.state_id);

    await dbInsert('audit_log',{id:'al'+Date.now(),action:'Ticket resolved',detail:id,user_id:session.id,color:'g'});
    await loadLiveData();
    showToast('✓ Ticket resolved');
    // Telegram notification
    const _rt=tickets.find(x=>x.id===id)||{};
    const _rloc=getLoc(_rt.location_id||_rt.locationId), _rstate=getState(_rloc.stateId||_rloc.state_id);
    tgOnTicketResolved(_rt, _rloc.name, _rstate.name, session.name);
  }else{
    const t=tickets.find(x=>x.id===id);
    if(t){t.status='Resolved';t.updatedAt=nowTs();}
    LOG('Ticket resolved',id,'g');
  }
  refreshPage();
};

<script>

// ============================================================
// PWA — Service Worker + Push Notifications
// ============================================================

const VAPID_PUBLIC_KEY = ''; // Add your VAPID key here for push (optional)
let swRegistration = null;
let pushSubscription = null;
let notifPermission = 'default';

async function initPWA() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swRegistration = await navigator.serviceWorker.register('/sw.js');
    console.log('✓ Service Worker registered');
    
    // Check notification permission
    notifPermission = Notification.permission;
    
    // Listen for messages from SW
    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data?.type === 'NOTIFICATION_CLICK') {
        navTo('dashboard');
      }
    });
    
  } catch(e) {
    console.warn('SW registration failed:', e.message);
  }
}

async function requestNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  
  const permission = await Notification.requestPermission();
  notifPermission = permission;
  return permission === 'granted';
}

// Show a local push notification (works without VAPID/server)
async function pushNotify(title, body, options = {}) {
  if (Notification.permission !== 'granted') {
    const granted = await requestNotificationPermission();
    if (!granted) return;
  }
  
  const opts = {
    body,
    icon: '/icon-192.svg',
    badge: '/icon-192.svg',
    vibrate: [200, 100, 200],
    tag: 'mtos-' + Date.now(),
    ...options
  };
  
  if (swRegistration) {
    swRegistration.showNotification(title, opts);
  } else {
    new Notification(title, opts);
  }
}

// Notification triggers — called throughout the app
function notifyNewTicket(ticket, location) {
  if (['admin','manager'].includes(session?.role)) return; // They raised it or are logged in
  pushNotify(
    '🔔 New Ticket Raised',
    `${ticket.title} — ${location}`,
    { tag: 'ticket-new-' + ticket.id, requireInteraction: ticket.priority === 'High' }
  );
}

function notifyAssigned(ticket, location) {
  pushNotify(
    '👷 Task Assigned to You',
    `${ticket.title} — ${location}`,
    { tag: 'ticket-assigned-' + ticket.id, requireInteraction: true }
  );
}

function notifyResolved(ticket, location) {
  pushNotify(
    '✅ Ticket Resolved',
    `${ticket.title} — ${location}`,
    { tag: 'ticket-resolved-' + ticket.id }
  );
}

function notifyExpenseApproval(expense) {
  pushNotify(
    '💰 Expense Needs Approval',
    `${expense.description} — ₹${Number(expense.amount).toLocaleString('en-IN')}`,
    { tag: 'expense-' + expense.id }
  );
}

function notifyOverdue(ticket, location, daysOverdue) {
  pushNotify(
    `⏰ Overdue Ticket (${daysOverdue}d)`,
    `${ticket.title} — ${location}`,
    { tag: 'overdue-' + ticket.id, requireInteraction: true }
  );
}

function notifyEscalated(ticket, location) {
  pushNotify(
    '🚨 ESCALATED — Action Required',
    `${ticket.title} — ${location}`,
    { tag: 'esc-' + ticket.id, requireInteraction: true, vibrate: [500, 200, 500, 200, 500] }
  );
}

function notifyAMCExpiring(vendor, daysLeft) {
  pushNotify(
    daysLeft < 0 ? '🔴 AMC Expired' : `🟡 AMC Expiring in ${daysLeft} days`,
    `${vendor} — Please arrange renewal`,
    { tag: 'amc-' + vendor, requireInteraction: true }
  );
}

// Check overdue/escalated on load and every 30 mins
function startLocalChecks() {
  checkOverdueAndEscalated();
  setInterval(checkOverdueAndEscalated, 30 * 60 * 1000); // every 30 min
  checkAMCAlerts();
}

function checkOverdueAndEscalated() {
  if (!session || !['admin','manager'].includes(session.role)) return;
  tickets.forEach(t => {
    if (['Resolved','Closed'].includes(t.status)) return;
    if (isESC(t)) {
      const loc = getLoc(t.locationId), state = getState(loc.stateId);
      notifyEscalated(t, state.name + ' › ' + loc.name);
    } else if (isOD(t)) {
      const loc = getLoc(t.locationId), state = getState(loc.stateId);
      notifyOverdue(t, state.name + ' › ' + loc.name, dAgo(t.dueDate));
    }
  });
}

function checkAMCAlerts() {
  if (!session || !['admin','manager'].includes(session.role)) return;
  amcRecords.forEach(a => {
    const days = amcDaysLeft(a.endDate);
    if (days < 0 || days === 30 || days === 7 || days === 1) {
      notifyAMCExpiring(a.vendor, days);
    }
  });
}

let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Show install banner after login
  setTimeout(showInstallBanner, 3000);
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  const banner = document.getElementById('install-banner');
  if (banner) banner.remove();
  showToast('✓ App installed on your home screen!');
});

function showInstallBanner() {
  if (!deferredInstallPrompt || !session) return;
  if (document.getElementById('install-banner')) return;
  
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:14px 20px;border-radius:14px;font-size:13px;z-index:9998;box-shadow:0 4px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:12px;max-width:340px;width:90%';
  banner.innerHTML = `
    <span style="font-size:22px">📱</span>
    <div style="flex:1">
      <div style="font-weight:700;margin-bottom:2px">Add to Home Screen</div>
      <div style="font-size:11px;color:#888">Open MaintenanceOS like a native app</div>
    </div>
    <button onclick="installApp()" style="background:#fff;color:#1a1a18;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Install</button>
    <button onclick="document.getElementById('install-banner').remove()" style="background:transparent;border:none;color:#555;cursor:pointer;font-size:18px;padding:0 4px">×</button>
  `;
  document.body.appendChild(banner);
}

async function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  const banner = document.getElementById('install-banner');
  if (banner) banner.remove();
}

// Show notification permission request after login
async function askNotificationPermission() {
  if (Notification.permission === 'granted' || Notification.permission === 'denied') return;
  if (!session) return;
  
  // Show a friendly prompt
  const banner = document.createElement('div');
  banner.id = 'notif-banner';
  banner.style.cssText = 'position:fixed;top:16px;right:16px;background:#1a1a18;color:#fff;padding:14px 18px;border-radius:14px;font-size:13px;z-index:9998;box-shadow:0 4px 24px rgba(0,0,0,.4);max-width:320px';
  banner.innerHTML = `
    <div style="font-weight:700;margin-bottom:4px">🔔 Enable notifications?</div>
    <div style="font-size:12px;color:#aaa;margin-bottom:12px">Get instant alerts for new tickets, assignments, and escalations</div>
    <div style="display:flex;gap:8px">
      <button onclick="enableNotifs()" style="flex:1;background:#fff;color:#1a1a18;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer">Enable</button>
      <button onclick="document.getElementById('notif-banner').remove()" style="flex:1;background:#2a2a28;color:#aaa;border:none;border-radius:8px;padding:8px;font-size:12px;cursor:pointer">Not now</button>
    </div>
  `;
  document.body.appendChild(banner);
}

async function enableNotifs() {
  const banner = document.getElementById('notif-banner');
  if (banner) banner.remove();
  const granted = await requestNotificationPermission();
  if (granted) {
    showToast('✓ Notifications enabled!');
    pushNotify('✓ MaintenanceOS', 'Notifications are now enabled. You will be alerted for new tickets, assignments and escalations.');
  } else {
    showToast('Notifications blocked. Enable in browser settings.');
  }
}

async function tgSend(chatId, message) {

      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        chat_id: chatId,
        text: message,
        parse_mode: 'HTML',
        disable_web_page_preview: true
      })

  } catch(e) {
    console.warn('Telegram error:', e.message);
  }
}

// Send to all users with a specific role
async function tgNotifyRole(role, message, excludeId = null) {
  const targets = users.filter(u => u.role === role && u.telegram_id && u.id !== excludeId);
  for (const u of targets) {
    await tgSend(u.telegram_id, message);
  }
}

// Send to a specific user
async function tgNotifyUser(userId, message) {
  const u = getUser(userId);
  if (u && u.telegram_id) await tgSend(u.telegram_id, message);
}
